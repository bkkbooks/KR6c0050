body:
  text: 四明沙門栢庭善月述示論懸釋綱領凡四論一名金剛般若波羅蜜經論三卷無著菩薩造隋天竺三藏岌多譯二名同上三卷天親菩薩造元魏三藏菩提流支譯三名能斷金剛般若波羅蜜多經論亦三卷與上同釋論偈此不入經無著菩薩造頌世親菩薩釋三藏義淨譯四經名同上破取著不壞假名論二卷功德施菩薩造中天竺沙門地婆訶羅譯有唐御製序論按無著以七種義句懸釋一經一種性不斷二發起行相三行所住處此三從別節經四對治五不失六判地約通明義七立名名本在初論從後立於中前六顯示菩薩所作究竟後一成立此經法門總為佛種不斷故流行於世謂依經成立七種義句復由義句成立般若復於第三行所住處開一十八住一發心止十八上求佛地列名對經如後又略為八住亦得滿足攝文亦足一攝住二淨住三欲住四離障礙住攝上住中十二種障五淨心六究竟對經如前住七廣大八甚深通前諸住各有二義如初住處說菩薩應生如是心等此為廣大又說若菩薩不住事行於布施此為甚深餘住例說云云四對治者謂於諸住各有二種對治一邪行二共見正行論自釋云此中見者謂分別也若菩薩應生如是心即初對治謂對治彼凡夫不能生如是心是為邪行對治又曰生如是心是菩薩邪行若菩薩有眾生想等即次對治謂若生如是心而有執想是菩薩邪行若論度生是亦正行而與見共故為共見正行此分別執菩薩亦應斷餘住例說具二對治始與般若相應五不失者謂離二邊如說福聚非福聚此遮增益邊不於如言說中執有自性故若言是故如來說福聚此遮損減邊雖不如彼言辭執有自性而有可說事是如來所說故又若說佛法非佛法者顯示不失義是名佛法者顯示相應義何者謂若說佛法有自性如來則不說是佛法此即不失義雖則不說亦自知其無有自性即相應義如是於諸住顯示二義不失亦云不共謂不與見共亦不失之義後文例爾六判地者謂信行地淨心地如來地於中前十六住即信行地證道住即淨心地上求佛地住即如來地此復有六具足六種淨等與天親斷疑文開合爾七立名文如後引然於一一示廣大甚深則般若之體次顯對治不失則般若之用體用既彰理則相應相應而後歷位歷位而後至極即一經大括包富若此非論曷知哉頌按義淨三藏論釋云西域相承云無著菩薩昔於覩史多天慈氏尊處親受八十行頌開般若要門云或云菩薩入日光定上升兜率云云即此經有頌之由也次天親論亦曰世親文先起例斷疑云自此下即自但應如一所教住下一切修多羅示現猶言顯示斷疑云何生疑謂不住法行於布施云何為佛菩提行布施邪斷彼疑故如經云云訖至後偈仍以八十行頌參釋其間有次第生起之相舊作二十七段釋今考其數亦開合多少不定如後見亦復妙盡經旨但二譯魏唐稍殊有入經不入之異然入經者與無著抗行故經頌兼釋其不入者直釋頌文謂之論釋猶記云爾而以頌文為無著所造意從傳者言之又云阿僧佉菩薩造蓋無著梵語云功德施論以二諦義統收一經故文初云佛所說法咸歸二諦一者俗諦謂諸凡夫乃至如來名義智境業果相屬二者真諦謂即諸法都無所得如說第一義非智之所行何況文字乃至無業無業果是諸聖種性是故此般若中說不住布施一切法無相乃至無來無去等此真諦也又說內外世出世間一切法相及諸功德此建立俗諦也惟其不出二諦故題曰破取著不壞假名論一經之旨盡在於此觀其文理明白與前二論雖稍異同然節節遣疑似附天親舊解引用間見一二而已惜哉今併取列釋之會解曰此經有六譯論列數家今釋正依秦本以文簡理順時所宗尚故也而論所釋經各隨所譯大同小異以彼釋此不無異同會釋如後夫無著天親內鑑冷然未始不同而外適時宜各權所據二論所以異也遂使後人難於適從兼取則文義齟齬通會誠難偏用則理致高深取舍莫可據圭峯曰住一十八處密示階差斷二十七疑潛通血脉言則善矣解釋乖張青龍疏雖復合釋而石壁非之至於淨覺取舍或偏以謂斷疑正釋經義却以生起附於無著所科是皆顛倒其說近代竹庵正依無著出入天親尤非通論今謂彼皆聖師寧容去取意其無著先已撰論後方聞頌豈可寢論而弗彰又不應舍頌而獨行故以授天親而解釋焉有以見其設心但在冥搜至理翼傳聖教初何彼此之間哉況天親親承於無著無著面受於慈尊源流不雜必無謬誤惟無著既盡科節之美而略於生起故天親復依頌義通貫一經生起釋疑以詳其說今得以合之故一以無著節經一依天親生起先列諸論附於經下次申會解以補其餘庶不遺聖言無混凡辭彰二論之具美成一家之釋相也經金剛般若波羅蜜經論無著曰名金剛能斷者有二義謂金剛者細牢故細者智因牢者不可壞故能斷者謂般若聞思修所斷如金剛斷處而斷故又如畫金剛形初後闊中則狹謂中狹者即淨心地初後闊者謂信行地如來地此顯示不共義也餘論無文會解曰名始於無名因名以得體由文字般若而見實相般若名所以立也此經從喻法為名初二字喻也據論唯取堅利為義謂金剛之性以堅故不壞雖百鍊不能銷其體利故能斷則萬物不能摧其用世傳可碎者金剛寶石爾故楞伽有謂如金金剛者所以別之也或不知此混為一說誤矣事如別出夫堅以譬般若之體無能壞故利以譬般若之用無所不壞故抑論明金剛者二義謂細則微密無間可譬般若智因謂牢則堅固不壞可譬般若果體但言智因舉因可以知果也能斷者亦二義即初句言法以三慧為能斷次句言喻以諸妄為所斷或兼取金明淨義以喻三般若者其說猶通今既依論宜本論釋金剛畫形之釋言中狹者謂淨心地證唯一道故初後闊者謂因該萬行果備眾德故而並約菩薩地說故曰顯示不共義抑教門有共不共般若義如常釋云云般若等五字法也般若本智慧之稱此不翻者彰其體尊勝故若曰智慧凡世出世莫非智也故不足顯今般若之智波羅蜜亦梵語正翻到彼岸或翻度無極事究竟等並從義譯即究竟度無極之彼岸也其名通前五度亦惟般若而得名爾今此言之重顯般若究竟義也經如常釋云云以是為名體極實相稱是以修宗於無住依是而起用能破相覽而為教通為般若是謂摩訶衍乘融通蕩相之教一經所詮無出此理異是則非也經如是我聞止敷座而坐論無著曰修多羅身相續義句今當說正謂如是等五事是一經之體由是義身般若流行於世故佛種不斷此為相續義句世尊何故以寂靜威儀而坐顯示唯寂靜者於法能覺能說故能覺者理能說者教非必定而後說蓋寂而常照之義天親無文功德施曰如是我聞者顯示此經是世尊所演非自所作一時者說此經時異餘時故在舍衛國等說處也令知此地佛曾游止種福因故一切經首列眾者何示現如來大威德故又結集者證己所傳無異說故會解曰一切經首皆作是語謂之經前五事或開為六謂六成就所以證信則曰證信序亦謂通序通於諸經對後別序唯此經故餘如常釋亦如前論爾時世尊下別序也乞食事本常儀今以發起無住相施於其城中次第乞已還至本處者此大有義舊作所表觀行等釋云云今別為一說城以喻涅槃涅槃本寂滅之理始以無出而出出而知返故今還入城乞以喻修道修道亦本有之事今以無修而修所修既極而至於果果則極性之地故還至本處因寄忘緣淨累安空息迹以示之此所以收衣鉢洗足敷座而坐也事雖在佛理宜約凡所託義顯抑非虗設也經時長老須菩提止善付囑諸菩薩論無著曰一種性不斷者此下正宗為顯當得佛種不斷義故須菩提最初白佛言云云經言善攝第一者謂已熟菩薩佛於成道轉法輪時以前五義中菩薩法於七種義句除判地立名建立諸菩薩七種大義如地持中說云云於菩薩所利樂相應是為善攝復由六種義故名第一謂一時乃至六異相時謂善攝現未利樂法故差別者謂善攝世禪及三乘法異故高大者謂攝無有上故牢固者法畢竟故普徧者徧攝自他故異相者於餘未淨菩薩中勝故言第一付囑者佛於般涅槃時亦以五義建立付囑諸已得者令善攝諸未得者復有六種因緣一入處謂於善友所善付囑故二法爾謂菩薩於彼法爾善攝故三轉教囑餘菩薩亦當轉攝故如其次第則為不失為悲為尊重六種義足顯示種性不斷也頌曰彌勒巧護義應知加彼身同行不退得未得是名善付囑天親釋曰魏譯謂於已熟菩薩身中與智慧力令成就佛法故自行又與教化力攝取眾生故化他是即同行義名為善護不退得未得者謂於未熟菩薩中功德有得未得懼其退失付授智者令得不退故又為得不退者不捨大乘故未得不退者欲令勝進故是名善付囑唐譯以善護為勝利益以付囑得委寄餘文大同功德施曰諸大乘中廣說世尊等功德須菩提已生淨信故言希有護念有二種謂真實護念如來攝受令悟也第一護念令轉化無量眾生也何故付囑為未見真實者贊喜當成如來體相故付諸菩薩俾其瞻護此亦有二為已生佛法者令增長故為未生者付之令生故何因獨贊未見實者為憫彼未得勝智勸誘令進故會解曰希有之歎發於如來未言之前其有旨哉正猶須菩提巖中宴坐天帝釋空中雨華云云以彼顯此旨意合同是須菩提與如來兩鏡相照於中熾然演說故發是歎良有以也若置是說則希有之言只是稱歎之辭其有二意一則先已聞佛功德及前所說般若故有是歎如前論一則發起後問以為言端謂如來能以是般若護念諸菩薩令其自行成就故復以是般若付囑諸菩薩令其化道具足故所以為善為希有顯如來之至德故有應云何住云何降伏其心之請冀其必答也而論約三時及根熟未熟等言者亦一往對明爾竟顯善攝付囑遞相轉教愈彰佛種不斷矣經世尊善男子善女人發阿耨多羅三藐三菩提心止願樂欲聞論無著曰此下第二發起行相須菩提問者有六因緣一為斷疑故如天親斷疑之釋蓋亦出此二為樂福德者聞多功德於般若起信解故三為已成熟者入甚深義故四為不輕賤者由貪受持不退轉故五為已得順攝及淨心者於法得入而生喜故六為今來世正法久住故亦即般若令佛種不斷故經言應云何住者住謂欲願言欲者正求願者有所求故作心思念也應修行者謂相應三摩鉢帝故亦云鉢提三摩提等無分別定也應降伏其心者謂攝伏散亂故若彼定心散時制令還住也又次第顯三種道謂攝道成就道不失道於三種菩提唯問發行菩薩乘以善問故故稱善哉也二論無文功德施曰謂所護念付囑菩薩趣向佛乘應云何住等住謂於何相果心住願求修行者當修何行而得其果降伏者降何等心使因清淨諸法先因而後果今何先贊果德令彼欣求而修因故諦聽者心專一境故善者如理生信思念者敬持不忘應如是住等者如其次第住如是果修如是行淨如是心即因清淨會解曰空生將申發問先言菩薩發是心者蓋凡求佛道莫不始於是心終於此道始於是心者發行之本也終於此道者所期之果也所以言之先正其本也即問應云何住等謂若發是心必有所住之地欲住其住者無住之理也豈住相心所能契哉故必降伏其心故下文言發心度生不住於相正答是問也魏譯於中加云何修行句秦本略之今謂彼各有意不須和會但如魏譯雖謂二外有修始得相應故以相應釋行其於後答略不相當似未盡善如後論若什譯則謂既住且伏是即修行故以答顯問文義宛齊則知秦本為善佛既印述所問則曰應如是住等或謂此二句正示玄要然以上根達觀非無此理蓋如是者直下指體之辭於此見得便是般若之體不動一絲毫如是而住如是降伏其心無不可者但釋經之法不爾既曰唯然世尊願樂欲聞豈空生不能此解論家不知其理要當依文解釋不可別自談玄使文理不合故知是二字只是標示所說爾論無著曰此下第三行所住處訖經有一十八門第一明發心如經經佛告須菩提諸菩薩摩訶薩止即非菩薩論無著曰經言所有眾生者總相說也若卵生下差別說也差別有三謂卵生等受生別若有色等依止別若有想等境界所攝別我皆令入涅槃者何故願此不可得義以皆是生所應攝故無過謂涅槃空是不可得義凡彼眾生皆應以涅槃攝取令出生死故無有過者亦無過上義彼卵生等並入願數故皆令入於涅槃如卵濕等微類及非有想等難處云何亦皆令入涅槃耶有三因緣故一難處生者得時故雖難處生亦有得度時者或云待時者二非難處生未熟令熟故三已熟者解脫之故何不直說涅槃而言無餘者謂與初禪等方便涅槃不別故彼以自力而得非究竟果故何不說有餘是共果故自以宿業謂與惑業俱非一向果身苦有餘故謂未盡苦果無有眾生得涅槃者如菩薩自得涅槃無別眾生故若菩薩有眾生相等者謂於眾生所為他想轉非自體想者則不名菩薩是以煩惱取眾生等想轉則有我想菩薩已斷我見故於彼不轉得自行平等相故信解自他平等論自注云行謂五陰行復次經言菩薩生如是心者顯示應如是住中欲願也若菩薩有眾生想即非菩薩又曰若起眾生想等則不名菩薩者顯示應如是修行相應中及降伏攝散時無眾生相也以菩薩於彼時眾生想不轉如彼相應爾炎所知相住故是故無有眾生得涅槃者頌曰廣大第一心其心不顛倒利益深心住此乘功德滿天親釋曰此頌云何菩薩大乘中住謂菩薩以四種深心故住大乘中功德滿足何等為四一廣心二第一三常心四不顛倒如經生如是心等廣心也皆令入無餘涅槃等第一心也如是滅度無量眾生等常心也謂菩薩取一切眾生如己身故如是於眾生常不捨離是名常心若菩薩起眾生想等此示遠離依止身見眾生等相故不顛倒心也唐譯以深心為意樂以第一為最勝以常心為至極餘文大同功德施曰此中顯示菩薩發四種相應心謂一無邊二最上三愛攝四正智對經如前云云無餘涅槃者謂了諸法無生性空永息一切有患諸蘊等云何愛攝謂慈愛一切眾生同於自己若入地菩薩無眾生想又如預流人不起身見不見有一眾生是我所度云何云智謂證真實第一義者眾生等想決定不生以般若力雖皆不可得以俗諦故而住其心以大悲故誘度眾生會解曰據所申問復別標示理應判答而無著初文直釋而已於復次下始作三義顯示似於一文具答三義謂由成就彼欲願故即住心義由相應攝散故不為眾生想轉即修行降伏義文已合釋發心竟而以次文為相應行相天親則以次答三問文見前後而先後與今譯異是皆進退難曉今謂彼二論一譯既皆聖師未易臧否謂經意多含各得其理可也但今依秦本宜從什釋即初答降伏次答住心以標結可知雖於論頌稍似不同然住心降伏其理本通故亦無甚害夫住謂住理伏謂伏妄兩者相須而特以先後相成問顯由住而後降伏故先於住心答彰自降伏而後入住故始於降心不先降心無由入理故答則從是雖反而順也所以以度生答降伏以行施答住心者應知發菩提心本於四諦有通有別通則四諦皆所住理諦諦之下皆容起惑故並須降伏別則依諦起願故二願下化以度生為首二願上求以修道為先特寄示其端不無所以故寄度生以示降心則若自若他皆無我人寄行施以示住心則若因若果皆無住相然則降伏主於遣相非謂止於度生住心主於無住非謂專於行施直一往爾能如是而住者必能如是降伏理一而已但與般若相應則無不住無不降伏要知相應與不相應亦觀其所住降伏而已一經始終皆此理也今更直釋之經言我皆令入無餘涅槃而滅度者謂向十類眾生皆當以無餘涅槃寂滅之理而度脫之無餘之言近則子果俱盡且令出於分段三界謂之無餘以大教言其實有餘遠則皆以如來滅度而滅度之始可謂究竟無餘雖如是滅度而彼眾生本皆寂滅亦無有得滅度者論直以同體釋之蓋得其一意爾無量等三亦可配釋上三種差別眾生何以故下重徵釋上實無之理謂一如法界本無我人故不見有眾生可得度者若見有之則有彼此有彼此則有我人非今般若所謂菩薩也論天親曰自此下說菩薩於大乘中云何修行及降伏其心依秦本即次答住心如經經復次須菩提菩薩於法應無所住止但應如是教住論無著曰此下第二波羅蜜相應行及餘住中隨所相應作五種解釋一依義二說相三攝持四安立五顯現凡諸住處對治為依義即彼住處為說相有所欲願為攝持明第一義為安立相應攝散為顯現通示經言菩薩不住於事等此為依義顯示對治住著故言應行施者此為說相謂六波羅蜜亦攝一切皆檀那體性故謂皆以不著為性檀那有三一資生施二無畏施三法施如次對六度云云法施三者若無精進說法多倦故若無禪定染心說法貪於利養不忍逼惱故若無智慧說即顛倒有多過故若具三者得成法施又諸波羅蜜有二種果未來果者謂檀得大福報乃至般若得根利悅樂於大人眾中自在故現在果者檀得一切信敬乃至般若得現法樂等於中若求未來果者為住事行施如施物得物果報局少若經言不住事行於布施等者果則眾多不可分別若求現果者為住色聲香味觸法若言不住色等行施者即說攝持施之欲願不住行施者以不住故顯示第一義不住物等所有事此為安立第一義應如是行施不住相想者謂相應三昧及攝散時不住相想即顯現也又為貪福德者不堪令堪故即住相以示不住顯示不住相施福德甚多猶如虗空凡三義故謂徧一切處二寬廣三無盡云云頌曰檀義攝於六資生無畏法此中一二三名為修行住自身及報恩果報斯不著護存已不施防求於異事調伏彼事中遠離取相心及斷種種疑亦防生成心天親釋曰檀義攝於六者謂一切波羅蜜皆以檀相義示現故言資生即檀度當體名也無畏有二者謂尸及忍皆亦名檀於已作未作惡不生怖故法施有三者謂精進等不疲倦善知心如實說故此即菩薩修行住也次頌不著自身者即經言不住於事也不著報恩者經言應無所住即供養恭敬等也不著果報者經言不住色等即果報也何故言護存已等謂若著自己則不能施若求報恩等則捨佛菩提此為異義為防護此二故皆不著又次頌言調伏彼事者謂不見施等三事如經不住相想故次說布施利益謂若離施等相想云何能成施福為防如是生疑心故不住相想則利益義成就也唐譯曰為明此亦咸有施相故以一攝六謂財施由一無畏由二法施由三是大菩薩修行之處如經云云餘文大同功德施曰法施三者謂精勤不倦引諸神通如無所得為人說法又復為他開演諸波羅蜜皆成法施復次不住事者依資生施說於所施財不應受著愛而行施心必生苦或復因施還追悔故無所住者依無畏施說謂菩薩修戒忍時不應生心求彼果報不住色者依法施說法施有二果依六塵境故而亦不住以菩薩證真實時法身亦無得故何況六塵云何行施因得清淨謂諸菩薩了第一義施及施物諸想不生是即伏心因以清淨或曰有施等三可生福聚三事並忘福於何有誤哉斯言不知第一義故不住於想以俗諦故行於布施如是福聚難可度量如十方空等會解曰經明無住相施而論云波羅蜜相應行惟其無住所以相應也蓋般若以無住為性無住而無所不住故以無住言之是相皆破以無所不住言之是法皆立是則不住而住住而不住不住亦不住故經初標云應無所住而末則曰但應如所教住標釋相顯則知言住不住未始不符也故大論云般若如火聚等亦以不取而取也魏譯言不住有三謂不住事行施無所住行施不住色等施而諸論帖釋云云今依秦本其義一爾即初文標也謂一切法本皆空相眾生迷執認以為有隨處生著故告之以性本無住令隨順而行故曰於法應無所住行於布施言於一切法無住則一切處皆檀波羅蜜蓋不特以內外財施而已故以檀度該三種施攝餘五度亦於五度亡相而修還資無住相施故曰不住色布施等釋也謂上於法之言雖有二財三事二種果報等別總言不出六塵皆所不住既不住六塵則六根五陰界入等法亦不住不住則與般若種智相應推是而言皆如來藏皆寂靜門苟契此理求不住者了不可得況六塵乎故結歸上無住相施理不應異也何以故下再徵釋所以施必尚乎無住相者以其福不可思量故也故曰云云然則既曰無住相矣何容更言施福之多曰各當其理無得而一也蓋不明無住則無以遣著不明施福無以引物希嚮而所謂施福者豈相之云乎故特以十方虗空譬之復宗結答則曰但應如所教住即酬向所問當如所教而住也又無著以五義通釋蓋彼釋經大體文相節目有如宗因譬等五分論議亦猶台宗文疏四釋皆其例也夫依義者如言對治住著是一經文義所依之本而次說相則凡所說必有法相如言六度等既不可著於事當求所謂欲願者以攝持之即與理俱無住之施也理不可以正示故以所非顯其所是則安立第一義也若不體其所以不住亦何由相應故卒明顯現所以觀照也凡諸文相皆得約而申之則其義備也疑天親曰自此下一切修多羅示現斷疑云何生疑若不住法行於布施云何為佛菩提行布施邪斷彼疑故如經經須菩提於意云何可以身相見如來不止即見如來論無著曰此下第三欲得色身住以依義則顯示對治色身慢故言相成就者此為說相顯示如來色身故須菩提言不也乃至凡所有相皆是妄語為成此義即顯欲願應攝持故以相成就為虗妄顯非相則不虗妄是為安立第一義言如是諸相非相則見如來者此為顯現謂相應三昧時於彼非相見故頌曰分別有為體防彼成就得三相異體故離彼是如來天親釋曰謂若分別有為體是如來者則是以有為相為第一義以相成就為見如來身為防彼見故經云不可以相成就等以如來者名無為法身故說相即非相偈言三相異體故離彼是如來者謂彼相成就即非相成就以三相者異如來體故若見諸相非相則見如來者此顯有為虗妄故離彼是如來又以相非相相對故彼生住滅異體不可以得如來法身此明如來體非有為菩薩如是知如來已為佛菩提行於布施則是不住法布施也唐譯曰此中意說三相之體是遷流故是故勝相即非勝相應以勝相非相觀於如來餘文大同功德施曰此下皆以問答遣疑持諸正法須菩提因疑云云相成就者是無常故皆是虗妄非虗妄者所謂真實名曰如來諸相若存是虗誑矣應以諸相非相而見如來即相徵求無所得故若能遠離眾生希望乃至法身亦無所得然能如是行不住施即於佛身速致圓滿斷疑一會解曰以無住相行施雖無所求可也以施而求佛果謂有住相可也是果與因似不相當空生所以疑也佛言可以身相見如來不者意發空生非相之答苟惟非相則不乖於無住是以不住因求無相果孰曰非乎論言欲得色身住者以次第義因必獲果果有色法二身色相非所求當求法身而言欲得者非實願樂擬問文云爾若但求色身彼尚理者必應起慢無對治故故云不也既曰如來所說身相即非身相又曰若見諸相非相即見如來此兩非義政自不同初謂非是之非所以揀之也所謂凡所有相皆是虗妄是也次言直彰無相所以亡之也是即非相之相是如來相理而言之相即非相非相即相論意正以相非相相對約有為無為彰乎離義離而後即斯善見矣凡所有相四句本謂如來通該諸法其理一貫亦是一經結要之文但是有相何適非妄皆為所遣可也至於復宗結旨非相即相何處不是如來皆為所立可也夫惟皆遣則一切法異皆立則一切法同既全同全異亦無遣無立無遣無立即是真如真如只是般若異名一切諸法一而已矣一亦非一妙旨斯在故知此文言簡理盡非相之相親見乃知疑天親曰此下須菩提復生疑致問向說不住事行施則因深義又說如來非有為體則果深義未來惡世聞必不信云何不空說法文先致問次斷彼疑如經經須菩提白佛言世尊頗有眾生止何況非法論無著曰此下第四為欲得法身住處於中二種一言說法身二證得法身今明言說法身故經言頗有眾生等修多羅章句者如上說七種義句頗有於此能不顛倒生實相否若如言執義則非實相世尊為遮此故於正法欲滅修行漸滅時以五義顯示故當生實相謂一者修行顯示如經有持戒修福等即增上等三學自少欲乃至三摩提等二者集因經言已得供養諸佛等謂一心淨信尚得如是何況生實想也三者善友攝持經言如來悉知悉見等謂如來於一切眾生所作中知其心見其身所依止故四者攝福德經言取無量福聚等謂福正起時為生滅時攝持種子為取故五者顯示實想經言是諸眾生無復我相等以實想故對治五種邪取一外道為我等想轉二內法凡夫及聲聞為法想轉三增上慢菩薩為無法相轉雖無法相而猶有取謂取無法故四世間有想定五無想定為有想無想轉是菩薩於彼皆不轉以其顯了有戒乃至當生無量福聚故經言何以故者是中邪取但言法及非法相轉不言餘者以我想及依止不轉故我想即初外道等依止即想無想定彼根定故且云不轉故不言之然於我想中隨眠煩惱不斷故則為有我取故經言是諸菩薩若取法相則為著我取等此我等想轉中餘義經猶未說故復言之於中取自體相續為我想取我所為眾生想謂我乃至壽住取為命想展轉取餘趣為人想又言當生實想者顯示對治不實想故此依義也於此顯示言說法身者說相也言當生者欲願攝持也無復我相等安立第一義也不應取法等於法及非法皆不分別是為顯了相應及攝散時也筏喻法門言法尚應捨者實想生故何況非法者理不應故此略顯示言說法身不應作不實想也頌曰說因果深義於彼惡世時不空以有實菩薩三德備修戒於過去及種諸善根戒具於諸佛亦說功德滿彼壽者及法遠離於取相亦說知彼相依八八義別差別相續體不斷至命住復趣於異道是我相四種一切空無物實有不可說依言辭而說是法相四種彼人依信心恭敬生實相聞聲不正取正說如是取佛不見果知願智力現見求供養恭敬彼人不能說彼不住隨順於法中證智如人捨船筏法中義亦然天親釋曰此下凡八偈初偈為斷彼疑故佛答言莫作是說等故偈謂於惡世時菩薩具足三德故能生信心名不空說次偈明於過去佛所具持戒等德故功德亦滿又經言是諸眾生無復我相等故有彼壽者及法等三偈此明佛說般若不斷由具慧故謂菩薩離壽者及法各四種相對彼說此依二四相說八義別壽等四相偈者謂見五陰差別一一是我即我相見身相續不斷名眾生相一期報命乃至命住名命相命滅復生六道名壽者相及法四相偈者謂一法相二非法相三者相四者非相言有可取能取一切法無故言無法相以無物故彼法無我空實有故故言亦非無法相彼空無物而此不可說有無故言無相依言辭而說故言亦非無相何以故以於無言處依言相說是為法相四種離是八種相故說有智慧如經云云然言智慧即足何故復說持戒功德為示生信差別相義故故偈言彼人依信心等謂彼有持戒等德乃至如經一念生淨信者則但聞說而已不正取義復有智者不如聲取義唯隨順第一義智故言正說如是取能生實相故經言不應取法者不如聲取法也非不取法者隨順第一義智也又經言如來悉知悉見者故偈言佛不見果知等謂彼持戒等人如來非見果比知以願智力現見故言悉知然言知便足何更言見或謂如來以比智知故復說見然言見便足何更言知或謂如來以肉眼等見為防是故故如是說言求供養恭敬者謂若有人欲得供養自歎有持戒等德佛於彼人則不能說佛自知見以無實故又言生者能生因故取者熏修自體果故若取法相則為著我等者謂但有無明使無現行麤煩惱示無我見而有我取故栰喻法門言是法應捨非捨法者故偈言彼不住隨等示修多羅法中證智不住以得證智捨法故如到彼岸捨筏也若隨順彼證智法是法應取如未到岸而取筏也唐譯以壽存作壽者想命根既謝轉求後有作更求趣想又曰有隨眠性非有現行執於一筏喻上而有取捨故云如來密意宣說筏喻法門餘文大同功德施曰後五十歲者人壽百齡分為二分初分五十教力增強後漸衰減名未來世是為後五十歲言持戒者此復有三一能離戒謂離十不善業故二能作戒作菩提分業故三能趣戒趣第一義諦故言功德者謂無貪等及悲智故智慧者了知生法二無我故離八種想者諦觀諸蘊無有主宰故無我觀諸蘊無常相續流轉故無眾生想觀今剎那亦生亦老亦死故無命想雖諸蘊循環受諸異趣於中無人故無取者想譬如因質現象質不至象而有象現由前蘊故從蘊續生前不至後無取者想亦復如是離法想者謂第一義法本不生故無法想以不生故亦無有滅故無非法想法非法分別離故故無想此言無想但顯想無非謂無法而名非想雖第一義離一切想而隨世言說故亦非無想此謂了知二無我性由戒善故能起深信又言智慧生於實想一切功德此俱攝故復以何義言悉知見令諸菩薩心勇猛故為欲開顯一切智故於諸境界朗然現覺非如比智見煙知火非如肉眼見麤近物若諸菩薩起我等想因生我執因於我執有我我所復生法非法想非如土木故經言不應取法者捨二邊故法有性相尚不應取何況非法本無性相復次無分別者善法如法尚不可取況不善非法若善法亦不取者佛何故說集福資粮故說如筏喻者如欲濟川先須取筏至彼岸已捨而去之如象脅經說若出生死證涅槃界愛非愛果法非法因一切悉捨斷疑二會解曰論言二種法身一往雖異言法則同蓋所證得莫非實相為法身故究而言之離身無法離法無身一法二義是謂如來究竟身法今此正明言說法身亦為下證得作本故兼言之經言實信或云實相實想能所之異也信實相者本當於智兼言戒福者論固言之一為顯示能信實相差別義故如天親二為此中攝一切功德故如功德施抑徒有戒福雖信而不解但有智慧雖解未必信惟三德備而後信解所謂緣能資了了能發正是也今秦本略智者意以能信章句兼之經言後五百歲或言後五十歲雖通二解依秦本為正以此為實者信為真實之實非謂實也知見之言論釋詳矣無復我相等正言能信之本本於無我有我則乖於般若故不能信所以為深為淨為得福無量者由無我故也然則如來所以知見者非謂知我知其無我也惟見亦然不唯諸佛於是見眾生亦將眾生於是見諸佛是知我相之極極於無我無我之極極於般若於般若中知見信解皆由無我可不究其所自乎論於是明二種四相我相四者或曰我想有情想壽者想更求趣想又曰我想眾生想命想壽者想所出不同名想或異今依秦本且以我人眾生壽者為次為正偈言壽者等從後舉爾亦曰四見四執四取等具應有十六我人知見委如法界次第依大論注釋云云然皆自陰入界實法起要以我見為本隨所執計得名不同四與十六名相開合云云諸論各為義釋非不詳盡今更約常情釋之然法本無我認為主宰者我也謂我為人靈於土木而性不可變是猶有人者在人也本四大五陰眾法生而取為己有者眾生也於無常法保以為常者壽者也準例餘釋亦應可知次法相四者魏譯有列有釋列從先立後蕩則曰一法相等釋則從經如曰無法相亦非無法相等凡兩重蕩立以成四相雖有前後理實無違言有法無者即相言性也空實有者謂空本無物即性言相故空相則有也又言彼空無物而此不可說有無者謂彼即相言空故空自非空以無物故相即是空則相亦非相對彼說此不得以有無言之是相與無相皆空故言無相由是言之初約空有二邊相對次約空有皆無相對言說相則義當中道既四者俱離是中亦不立所謂中道不須安是也今秦本從略合而言之但曰無法相亦無非法相正約空有雙蕩的顯中道則般若破相之旨顯矣雖各有理什簡而優再言何以故下據無著以破邪取則順釋其文天親既彰俱離則反顯其說今依秦本直釋正由上言無復我相而又曰無法相等故復追釋反顯之意謂若心取相者我相也有我相則有我取凡以是取法相及非法相均不免為著於我人故凡三重遣著併不出二空而已謂初則以實從假即人法空次以法非法俱相即性相空故雙結顯曰是故不應取法等既皆不取則遣無不盡即中道畢竟空明矣然則猶存中道何邪曰中體本離故不當遣立然亦遣者遣其著情爾無著明邪取有五者約實想通破故也經則唯言法及非法想轉即內法凡夫二乘上慢等菩薩有著法非法相見故於是言之若餘我想等則外道所著及想無想轉非所破之要文置而不言又曰然於我想中隨眠不斷者此復於我想而論麤細謂已斷現煩惱者雖無麤想而隨眠不斷故轉為我取取彼法非法想是亦我想而已文言隨眠天親對現行麤惑說即無明也所謂此我想轉中餘義經猶未說是也此通別進否文頗難明因得以申之筏喻法門下引喻證也法非法義如諸論釋無非是者亦可謂非法者般若也凡諸法相尚應須離何況般若而不自離乎此當克體釋非法也別譯楞伽有此一說併見於此疑此下為遮異疑向說不可以相成就得見如來何故釋迦得阿耨菩提說名為佛復云何說法為斷此疑如經經須菩提於意云何如來得阿耨多羅三藐三菩提邪止即非佛法論無著曰此下次明證得法身復有二種一智相二福相智相至得法身者經言如來得阿耨菩提等依義顯示為翻正覺菩提取故及攝所說法皆不可得故言無有定法即須菩提道佛意也若言有法可說名菩提者是為說相以世諦故說有菩提及得者為欲願攝持以方便故有如佛意則二俱無故曰如我解佛所說等又曰如來所說法皆不可說等者取謂正聞時說謂演說時由說故知說及所說皆不可取即安立第一義也非法者分別性故非非法者法無我故以無為故得名聖人者若無分別義名無為者是菩薩以有學得名即相應攝散時顯了故若無起無作如來轉依名無為者即如來以無學得名唯第一義無上覺故次言福相至得法身者經言若人滿三千世界等即彼言說法身出生如來福相法身乃至一四句偈生福甚多況復如來所有福相為成此義故言如來阿耨菩提從此出生以普習十法行阿含故十法行未撿亦由世諦故言佛出生及得菩提此二並說名為佛法又言佛法即非佛法復次其所生福勝彼福者以依義則顯示對治福不生故言其福即說相言勝彼即欲願攝持是福聚即非福聚及非佛法等並顯安立第一義諦以隨順無為得名故相應攝散不復顯了上卷止此頌曰應化非真佛亦非說法者說法不二取無說離言相受持及說者不空於福德福不趣菩提二能趣菩提於實名了因亦為餘生因唯獨諸佛法福成第一體天親釋曰謂佛有三種一法佛二報佛三化佛今釋迦則化佛不證菩提亦不說法如經無有定法等故然一向不說邪為遮此故故言說法不二取謂非不說但說者聽者不取法非法故以彼法非法非非法依真如義說故非法者一切法無體相故非非法者彼真如無我相實有故何故言說不言證謂有說即成證義若不證者則不能說如經一切聖人皆以無為法得名謂彼法是說因故一切聖人依真如法故能說彼無為法復以何義言彼法不可說況如是取以遠離言說相非可說事故而言一切聖人者以依真如有分有具故又經說七寶施福譬喻校量者顯法雖不可說取而福德不空故偈云云言福不趣菩提等者謂受持演說二者能趣菩提如經乃至受持四句偈等是福德聚文有二義一積聚義二進趣義論作聚義有二種文似未安亦是文略應云福聚文有二義謂聚非聚偈亦二義謂趣不趣以偈配經聚即不趣趣即非聚二義而已故云如人擔重不能進趣如是彼福德聚以積重故於菩提不能進趣說名為聚非福聚者即二能趣故於彼福德中勝所以能趣者如經一切諸佛菩提皆從此經出生等故偈言於實名了因謂菩提者名為法身體實無為此二於彼能為了因雖不作生死因亦為餘報化二佛作菩提因故是為唯獨諸佛法此福能成彼第一不共體故如是名福德多唐譯又以進趣為肩義謂在肩能持故以此名聚為肩却以不能持者為非聚義云云顛倒其說失理一也餘文大同功德施曰此明佛證真實無法可取言說法者順俗名言非第一義以法非法無所取故說名菩提而言諸佛證菩提者謂無得而得以菩提無生故須菩提以密意答言無有少法可得非於無生而不現證言不可取不可說者無能取能說故無為者無所得義聖人者見真實義為它說者謂於二諦善能開演不顛倒故其福勝彼者以二門故謂理及教教者經言施中最者所謂法施餘財施攝故理者財施住於生死法施能成究竟功德故佛法即非佛法者謂諸法體性空無所有此若開顯是佛法身見有性者於法未悟依此密意說非佛法若知法無性覺此名佛若持此法了無性者斯名法施斷疑三會解曰觀今此文據論不出福智二嚴以二嚴故理性得顯則至得法身一也至猶極也修德之極必得法身從能顯說故曰二種經言無定法者空生深領佛意謂所得所說無決定義亦不可思議之謂因自釋曰皆不可取不可說非法非非法等謂是法妙不可以相得故曰不可取理不可以言示故曰不可說方謂之法體不可得方謂非法相實有故依真如第一義說故曰非法非非法又曰一切賢聖皆以無為法而有差別則又覆釋上所說法皆由依無為法故其說如是是即真如異名而有差別者非無為有差別正言能依者差別爾魏譯曰得名賢聖者謂一切賢聖皆以無為法為本而得有淺深故聖賢之名立學無學所以異也偈言應化非真佛亦非說法者謂釋迦者應化也不可以身相見者真佛也二者不可同日而語此斷疑意也而曰化佛不證菩提亦不說法者一往以法報奪言之然非不說法得菩提也但無有定法故得而非得說而非說肇師云諸相煥目而非形八音盈耳而非聲是也抑以三身分別則得菩提者報佛也說法者應身也無說無得者法身也若相即而說應即法報故得而非得法報即應故無說而說各有其致理不可偏次言福相法身於中先舉譬校量言甚多者於事雖多校法則劣故曰是福德即非福德性是故如來說福德多者約事順答且云多爾非福德性以言多若望次文所校之福此但福德不趣菩提所以秦本特加性字意為生下次文顯持經福勝所謂二能趣菩提也何以故下復徵釋所以勝彼之義以其能生菩提及法身故今譯從略但言出不言生義兼之也然所出生者佛法也佛法非法亡之恐其著也於佛法起見尚應須離況餘法乎此非之之言諸論或以安立第一義釋或約證悟釋或以無性等釋並各有理詳之可知疑天親曰向說聖人以無為法不可取說者須陀洹等亦取自果如證而說云何言不可取說也為斷此疑如經經須菩提於意云何須陀洹能作是念止是樂阿蘭那行論無著曰此下第五為修道得勝中無慢又八種住中第四離障礙住凡十二障謂一慢二無慢而少聞三雖多聞而小攀緣作念修道乃至十一雖具資粮而不自攝十二雖自攝而無教授第一為離慢故者經言須陀洹等此以依義顯示對治我得慢故謂若須陀洹等作念得果即有我想我想即慢非謂無慢而有四果名相之異此為說相若顯示無慢即欲顯攝持言實無有法等是為安立第一義以實無所行故顯無諍行及離欲者此以己證令彼信故為顯現相應行也文仍作安立第一義者誤頌曰不可取及說自果不取故依彼善吉者說離二種障天親釋曰謂以斷疑成彼不可說取故聖人以無為法得名故不取六塵名須陀洹又名逆流於六塵不入故乃至阿羅漢不取一法是為不取自果非不取無為法以為自證若起如是心謂我能得果等即有使煩惱在非現行煩惱於彼證時已離我取故何故須菩提自歎身得受記證果說無諍行為於彼中明勝功德生深信故而實無所行者謂依善吉說離二種障故一者煩惱障二者三昧障離彼二障故無所行唐譯曰無為之法體不可取為此聖人於自果不取不說若作是念者意說有隨眠惑非是現行故非彼證現觀之時有我等執餘文大同功德施曰若所證無性者四聖果云何得成不見世間無物有果為遣此疑經曰須陀洹等四果名相云云如是四人皆不作念我能得果以於證時無所得故故曰實無有法等若作是念有我等取離身見者無彼取故故以無為說名聖人無為相者空性相義須菩提述己所證無如是念若行於無諍不悟即空如來不應贊言第一諍者所謂煩惱離彼煩惱名無諍定斷疑四會解曰此章名為修道得勝中無慢者夫修道必志於得果得果則或勝心隨之以己之得輕彼不得之謂慢於是起慢我見不忘則見與果皆非故必無慢然後為得所以明離慢也若約斷疑云者既曰不也則是不作是念以取自果況當起慢故無違於不可取說也經本示菩薩離慢而以小果言者蓋寄小明大若彼當分未必能忘今此言者亦般若意在淘汰融通小執故假須菩提以發之使彼聞而無著則一言而兩得矣須陀洹名為入流又曰而無所入者釋所以不取之義謂證初果預於聖流故入者入無所入又入此者必不入於彼了知六塵皆不可得故無可入不同凡夫實有涉入故亦得謂之逆流也斯陀含名一往來以其欲思九品前六品盡而餘三猶在故須一來方得三果三果所以名不來也此來不來等約事雖爾以彼所證空理了無來去故皆以無言三果合云而實無不來今本略者不無其旨蓋無字已當於理若更云不來則似煩重然但云來映帶前文則不來可知略意在此至阿羅漢此當無學獨言道者道則因義為讓究竟極果無學故也是亦譯者之意實無所有名阿羅漢則無學之至者若作是念即著我人者文應例言之反以言著顯其不著不著則無得矣又曰我得無諍三昧者須菩提自述佛印也意則以己證彼亦顯無得而得雖然使空生以為己能則是起諍非無諍也阿蘭那行與前無諍華梵㸦見爾要皆以無得無行為本使後之人於一切法亦皆無行無得則我即空生空生即我夫豈有古今聖凡之間哉疑天親曰復有疑釋迦昔於然燈佛所受法得記云何而言彼法不可說不可取等又功德施曰若預流等不得自果云何世尊遇然燈佛獲無生忍為遣此疑如經經佛告須菩提於意云何如來昔在然燈佛所止實無所得論無著曰此下第六為不離佛出時亦為離少聞障故謂彼佛出世承事供養則有法可取離此分別故依義等釋例前可知頌曰佛於然燈語不取理實智以是真實義成彼無取說天親釋曰為斷疑故如經云云謂如來於然燈佛所言語所說不取證法顯彼證智不可取說唐譯大同功德施曰此文顯示昔遇然燈佛時以悟無生生法可取言獲忍者以俗諦故如說得菩提者謂無所得復有經說我坐道場無得而起又曰我所有法皆不可得或曰言語不能取證法非智不取此說違經經說第一義非智之所行何況文字故復次智所知境名所詮境是二差別智之所證名初不行何義須說語不能取復次餘經中說於然燈佛所得無生智不取於法如彼經言菩薩有四謂初發心見色相如來修行菩薩見功德成就如來不退菩薩見法身如來一生補處非前三見彼菩薩以淨慧眼而觀察故不復是見見非見是二邊遠離二邊是即見佛亦見自身見清淨故一切法皆清淨我如是見然燈如來得無生忍證無得無所得理乃至不住一切識之境界得六萬三昧然燈如來即授我記是授記聲不至於耳等顯是智證而無所取是心法而非語法當知此中說智之境界云何餘師固謂遮語斷疑五會解曰前既以果疑因此復以因疑果如功德施言疑意是也天親所述則成以果疑法經言於法實無所得者示授記時所證境界極言其理未必空生能到由佛力故得以言之既曰無得則凡可以言示者皆有得者也若無所得則不容言尚何措心擬議於其間哉所以維摩唯一默然示不二法門者以此論舉或者之言曰言語不能取證法非智不取謂此說違經又曰智所證言所詮此二差別者是則言智證可也言取則不可抑不知智有分別之智有無相之智而言亦有可有否如以離性得義之言雖以語言示證可也故知法無定論唯義所適又如彼經明見佛有四後一則見佛之極過此無見可論可謂妙盡其理也云何餘師固謂遮語者斥彼以凡所非皆為遣著之語曾不知是言智之境界無著以此為不離佛出時及離少聞障者由值佛故獲無所得智是即多聞離少聞障所謂若知如來常不說法是名多聞反顯有所得者為少聞矣疑天親曰若聖人以無為法得名是法不可取者云何菩薩取莊嚴佛土及受樂報佛取自法王身復云何餘世間取彼是法王之身為斷此疑如經經須菩提於意云何菩薩莊嚴佛土不止應無所住而生其心論無著曰此下第七為願淨佛土亦離雖得多聞而小攀緣作念修道障故經云云謂若念嚴淨佛土者則於色等事分別味著為離此故言應生如是清淨心等頌曰智習唯識通如是取淨土非形第一體非莊嚴莊嚴天親釋曰諸佛本無莊嚴國土事唯真實智慧習識通達非彼土有可取相若人取彼國土言我成就者是菩薩不實說如經云云故偈言非形第一體等言莊嚴有二種一者形相二者第一義相今從次義故說非莊嚴莊嚴又非莊嚴者無有形相以諸功德非嚴而嚴即第一義莊嚴若分別佛土是有為形相者則是住於色等境界為遮此故應如是生清淨心等唐譯曰從諸佛淨智所流唯識所現此則不能有所執取功德施曰眾妙珍奇悅可於心名為莊嚴則有色等體相第一義中斯不可得說非莊嚴而依俗諦以智成就是名莊嚴言不應生有住心者凡作我成就有住之心不應生故不應住色生心者於色等果不應求故應無所住而生其心者應生以智成就不住之心也斷疑六會解曰菩薩取果人之土諸佛感因行之修與物結緣嚴淨佛國斯佛菩薩常理也維摩明佛國因果非不詳著而此特亡之何也曰亡之立之各有其理彼為明佛國因果顯不思議之宗故須立法以成其行此因言不可說取示無定法之義故須遣著以彰其智然亡之不無其照立之不無其遣故一亡一照為言不同一遣一立其致一也使不相成濟亦不足為今取土極致也夫台宗一家明土有四曰同居曰方便曰實報曰寂光云云今此言者文因承上果證而來又疑菩薩所取之土極唯從理正當寂光故曰無形第一體非莊嚴莊嚴教門則曰寂光理土端醜斯亡無能莊嚴無所莊嚴即其義也然以非嚴而嚴亦得謂之究竟報土以土例身則受樂報佛義適相當而言智習唯識通者智謂真智無著習則熏本修習識則唯心無外具足三者乃能通達究竟理土故曰如是取淨土等淨名記釋謂四智和合為集識轉為智名通是應以習為集亦一說也於是結顯無住則曰應如是生清淨心謂雖生心嚴土而不住於相亦不取而取不住六塵而生其心文與前同而意則異云云夫唯如是復何攀緣作意之有而特以小言者謂小有是念則乖理體亦異乎六塵攀緣故也正恐初心淺行有是障故防離云爾抑兩論意別固不可同日語也疑如前云何受樂報佛云云如經經須菩提譬如有人身如須彌山王止是名大身論無著曰此下第八為成熟眾生亦離捨眾生障故如彼阿脩羅王等大身量如須彌尚不應見其自體何況餘者如來說為非身者顯示法無我故無生無作以為自性與相差別故頌曰如山王無取受報亦復然遠離於諸漏及有為法故天親釋曰為斷疑故說彼受樂報佛體同須彌山王鏡象之義故言如山王無取等謂勢力高遠故名為山王以無分別故而不自取受樂報佛得無上法王體以分別亡故不取自相亦復如是故說非身名為大身以遠離諸漏則無有物唯有清淨妙身而不依它緣住故曰遠離於有漏等上卷止此唐譯云云功德施曰此喻顯示自在之身如須彌山由共業力雖無分別而生大體如來亦爾於無量劫修諸福行雖獲大身不由分別以第一義中山及色身無體性故是形相者皆有為故如佛說非身是名大身非謂有身名大身也斷疑七會解曰此章以諸論對釋文相絕異今謂各有其理無著約當文釋義故以成熟眾生言之亦是捨離眾生障蓋左右之異經言大身即欲界眾生中舉其大者有如阿修羅等意則菩薩雖為成熟眾生而不見眾生相亦如現彼大身尚不見其身況其餘者又曰佛說非身是名大身此應知有事理以事還是言彼大身出於變化不有自體故能如是之大若實有是體使復有大者形之則體亦小矣以理則顯示成熟眾生令其證法無我以彼體非體了無生無作說非身之身故曰顯示自性與相差別言自性則非身之身與上大身相異也天親取承上斷疑故不取自法王體有如山王無分別義謂雖有大身而非大身釋上無為不可取之疑而言非身者謂以所非言之則非有為有漏身所謂遠離有漏等是也以克體亡相言之則相而非相即非相名大身所謂以第一義故山及色身俱無體相是也然以三身分別既曰受樂報佛即報身也故教門以證非身為勝的據是文誠得其當也或者又以涅槃百非之身證非身為劣者曾不知彼約所非之身還是以身為劣以能非者為勝其義宛順也此殆自昔莫決之論苟得今能所義其旨判然矣從第三至此往復折徵凡五釋疑並顯不可取說無有定法之義其理既窮無可疑者則復舉沙數恒河世界七寶施福以為校量顯其福勝此下文凡四段如經云云經須菩提如恒河中所有沙數止如來無所說論無著曰此下第九為遠離隨順外論散亂依離障中其名大同故經說四種因緣顯此法勝謂一攝福德二天等供養三難作四起如來等念對經云云於中言說者為它直說或教授它顯示此法勝異對治樂彼外論散亂等過或於中起如言執對治彼未來罪故說般若即非般若亦顯無有餘法如來說者故言如來有所說法不此則顯示自相及平等相第一義法門也頌曰說多義差別亦成勝校量後福過於前故重說勝喻天親釋曰前已說多福德譬此復說無量世界譬者為漸化眾生令生信心上妙義故又前未顯以何功德能得菩提故以此譬成彼功德餘文入後段釋唐譯大同上卷止此功德施論文目此下作十三種因示之門合不同併出四段後云云會解曰文本重舉廣譬校量持經之福而論言遠離外論散亂者亦由上明成熟眾生則必菩薩出以為物而尚居信行或不免隨外論散亂如前邪取之論及定心時馳散外境故須內不失照無散亂之非外順物機無邪取之僻使內外不失其宜如是受持四句偈等無它人說則其福勝前施福果不虗矣故經先明所校之本次說持經福勝隨說經處為人天等供養如佛塔無異況盡能受持成就最上希有之法則作所難作是應作念隨經典所在處若如來無二以法即是佛佛即是眾亦是尊重弟子如須菩提等所在一體三寶文見於此法華云若人信汝所說則為見我亦見於汝及比丘僧即其義焉又曰如言執義為對治彼未來罪者然般若雖勝執之則乖因執成妄起未來罪故須菩提於是問名如來於是勸持而復遣之故曰佛說般若等夫非之云者所以對治如言之執然則般若信非般若而亦有餘法可說乎則曰如來無所說苟無所說則餘法亦般若是為顯示般若自相及一切法皆般若則平等相也如是法門即第一義經須菩提於意云何三千大千世界止是名世界論無著曰此下第十明色及眾生身摶取中觀破相應行亦為離影象相自在中無巧便故經言三千世界彼不限量攀緣作意言菩薩恒於世界攀緣作意修習於中為破色身影象相故顯示二種方便一者細作方便如世界所有微塵等二不念方便如經諸微塵如來說非微塵等又經言世界非世界者顯眾生世界也但以名身名為眾生不念名身方便是即顯示故不復說彼細作方便也經佛言須菩提於意云何可以三十二相見如來不止是名三十二相論無著曰此下第十一明供養給侍如來亦為離不具福德資粮障故如經云云為成福資粮故親近供養不應以相見如來應見第一義法身也頌曰尊重於二處因習證大體彼因習煩惱此降伏染福天親釋曰云何成彼福勝謂二處者一所說處二能說人於此二處生尊重故非前七寶等施福以此法門能與諸佛證法作勝因故如經言如來無所說法等謂是證法非獨如來無所說餘佛亦如是說故彼珍寶布施是煩惱因成就彼染事故此因示現遠離煩惱故說地塵喻以體是無記非貪等煩惱則此福為近能降伏勝也彼施福染因何況此持經福能成菩提及於成就相福中勝以彼相福於佛菩提為非相故亦非法身故知此福復勝於彼則最近最勝唐譯曰由劣亦勝故者謂外塵雖是無記彼福縱善方之亦劣又彼相業比今福因是亦為劣望彼施福猶勝過故是劣亦勝也況法身因而不超越餘文大同云云會解曰經明世界微塵多而非多二論各為說不同無著謂觀破色及眾生身摶取顯相應行義則是以外塵非塵例破色身和合離身影象障言影象則無實之義自在中無巧便者謂有色則有礙了影象無實則自在矣使無巧便亦不能離與般若相應故初明外塵雖多而無實以例內身和合而虗假彼不限量攀緣作意者謂彼地塵初不限量塵之多少及攀緣作意而菩薩自於世界言塵數多緣於外塵作意修習是還承上文為次也破色身中顯示二種方便者謂一以微細末塵作方便二以不取念著作方便並如經以是滅彼影象則色身忘矣二以世界非世界破眾生假名由名身易破故但用其一不用其二也天親則謂由上施福是煩惱因故說地塵為遠離因意以外塵性是無記非煩惱體異彼施福是染因故以顯持經福德不唯非煩惱因而又能成菩提是則施福為下塵性次之持經福則至矣次章言可以三十二相見如來不者依無著以不具福德資粮故應見如來當以法見而不應以相見也天親還依校量福勝故以彼相於佛菩提則為非相理各有當無得而一也經須菩提若有善男子善女人止是名第一波羅蜜論無著曰此下第十二遠離利養疲乏熱惱不起精進故亦為離懈怠利養等樂味障故如經明捨爾許身所有之福故發起精進經言若復有人等即是以清淨心生於實相若實生如是想則為於實相有分別為離此過故復言是實相者即是非相等又經言我今得聞等者為令於味著利養懈怠者生慚愧故說於來世正法滅時尚有菩薩於此法門而能信受無人取法取等見云何汝等遠離修行故經言此人無我相等示無人取也又曰我相即是非相等示無法取也離一切相即名諸佛者示順學相也佛離一切相故我等亦應離之此並為離退失精進故言不驚不怖者於聲聞乘說有法及空而已今於此經聞法無有故驚聞空無有故怖於二不有理中不能相應故畏以驚畏故不能發起精進若不驚等則反是也又聞若相若生及第一義三種皆無自性故不驚等如來說第一波羅蜜者一為顯此法勝上令生慚愧處故二以於餘波羅蜜中勝故三示一切諸佛同說故故名第一頌曰苦身勝於彼希有反上義彼智岸難量亦不同餘法堅實解深義勝餘修多羅大因及清淨福中勝福德天親釋曰此不重明福勝謂捐捨身命重於資生珍寶等施而此福復勝於彼何以故彼捨苦身不如為法念彼身苦故捨須菩提以重法故悲泣而言凡七義明勝謂一希有等雖有慧眼昔未曾聞故言希有一般若智岸無人能量故名第一即上義也二以有實相異餘非實故名不同三以思量修習不起我等相故堅實深妙四不起我等相者示所取境界不倒故我相即是非相者示能取境界不倒故亦二無我智不驚等者謂於非處生懼曰驚如非正道行故以不能無疑心故曰怖一向驚怖恐其墮故曰畏若能遠離則曰不驚等又此法門勝餘修多羅五是第一故名為大因六諸佛所共說故名為清淨七並如經云云唐譯釋義大同云云功德施曰復次如恒河中下顯示受持正法其福甚多凡十三義謂處可恭敬故人可尊崇故一切勝因故彼義無上故越內外多故勝佛色因故超內施福故同佛出現故希能信解故難有修行故信修果大故信解成就故威力無上故何故殷勤說此諸因相耶以諸眾生行資生施求財位果不持正法斷諸苦因故故顯示此處可恭敬等一一對經云云言不驚等者謂於諸法無生無和合相無有決定信解成就故亦於聞思修時心安不動故也會解曰自初文至此以無著則文為四住以天親則一喻二處及七勝義以功德施則十三種因雖開合不同其為校量福勝顯持經德用一也言其福不出有三謂七寶施福內財施福持說經福是三者一為所校二為能校以其所顯則持經為㝡此其大略也然以七寶施福而有廣狹如前但舉大千世界狹也此舉恒沙世界廣也內財施福而有兼但如直捨身命但也為法而捨兼也持說經福亦有分具及淺深等如持說一四句偈等分也盡能受持等具也前以大千七寶所校者淺也以恒沙世界七寶所校者深也如其次第一一迭論則初譬為劣以其聞者未能深契故所校則淺次譬當斷疑之後聞解既勝故所校則深以持經福超內財施者據但者言亦次第然也二往言之為法而捨內財者復勝於後以事理兼行故也初譬雖劣而能成立施因苟不以住相則持經之福何以加此經又以地塵喻非煩惱因得同於勝福三十二相本是相業反劣於持經故知苟有分別雖相而非苟無分別雖塵亦是但在其心不在事福也復次須菩提隨說是經下言持說有分具也既曰隨說則一四句據極少言不局一文一偈而已文本正宗而便問名請持者一經大旨槩盡於此後諸文義敷唱厥旨亦不乖隔一經大體況所言者般若之實故繼之問名宜也名必有義則後諸所說般若之義也故說般若波羅蜜者所說之本也即非般若等約二諦以結顯也二諦既彰中道可知則三智之道備矣三智者理也因理以及教則曰如來有所說法不須菩提復承佛力而言之曰如來無所說夫無所說者是真般若也然於說處無說是說即般若無說而無所不說則因理以及事故曰三千大千世界所有微塵等是世界微塵者般若之事也惟其皆般若故則曰諸微塵如來說非微塵等然則教理及事皆因也因因以及果則又曰可以三十二相見如來不亦曰不也不則彰其非相是如來之相亦般若而已矣夫惟般若徧攝一切法而一切法即般若持是經者何福以非之於是舉捨恒沙身命以校其福則又進一等無著以此下文為遠離利養疲乏者不出違順二障由前福德資粮有具不具具則有利養等障不具則有疲乏等障非極言校量之福則不足以發起大精進故時須菩提聞法深解喜不自勝而至於泣則其感悟可知且曰所得慧眼未曾得聞者夫昔所得慧眼直空智而已非所以兼亡自性之至空也所以聞之者因心生信因信入理理固本然要由信得故曰信心清淨則生實相生則得也實相則理也信之曰實信觀之曰實想性之曰實相理一而已所以成就聞解功德第一希有者以其至空也有則有法得以擬之非無相也故曰是實相者則是非相不見有一相者名為實相我今得聞等者復以正法末世校其難易佛世為易者以其根利障輕故無我人等相則信解為易末世反是信之為難然有信解則為希有所以進之也雖然而我人等相亦本非相未始離於般若苟能體之復何難之有故曰我相即是非相等又曰離一切諸相則名諸佛是復以佛能離相勉彼聞者所以實上希有之義如來印之則曰如是如是不驚等言亦領上信解受持一句即信故不驚解故不怖勇於受持故不畏上以無我相等釋希在此以說第一波羅蜜釋之蓋相成顯爾而曰非第一波羅蜜者亦上兼亡自性之謂也
