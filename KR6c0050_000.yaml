front:
  text: 金剛般若經會解序讀金剛一經使人之意也消蓋其理玄其性離其行無著其相非相以是四者更相發明宛轉反覆卒歸於無我人衆生壽者而已矣獨於勸持校量功德每諄諄焉即一經之大略也乃知是般若無上密印實俾人了悟性空遣蕩相著譬之如金剛如火聚如吹毛劒如走盤珠如捕風繫影不可控摶如是而已世多誦習而知者蓋寡愚嘗慨斯文言微旨密喻雖重而非贅徵屢設而非煩雖三論之作彌復難曉殆似郭象之為莊解也於是取論以考經本經以證頌論有苛甚者刪治之義有缺如者附益之合諸論以成一家之言目曰會解聊述管見以求正云噫使直披其文猶足以袪鄙吝而釋膠擾況因解以得論由論以了經又豈特意消而已哉時嘉定辛未閏月望絶筆柏庭善月序
