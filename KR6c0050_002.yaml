body:
  text: 疑天親曰向說捨身是苦身果報故彼福是劣若依此法門說諸菩薩行於苦行云何不成苦果為斷此疑如經經須菩提忍辱波羅蜜止見種種色論無著曰此下第十三明忍苦為離不能忍苦障故於中有二一能忍二離不能忍能忍有三一如所能忍謂達法無我故如經說非忍辱等二者忍相謂他於己起惡時由無我等相故不生瞋恨亦不於忍中及非波羅蜜生有無想如經我昔為歌利王等三者種類忍又二一極苦忍如經節節支解等二相續忍如經又念過去於五百世等二離不能忍者不忍因緣有三一流轉苦二衆生相違苦三乏受用苦如經應離一切相發菩提心顯示菩薩以三種苦故不能發心故說對治應離流轉等苦若不著色身則不見有諸苦相故菩提心生又曰菩薩為利益一切衆生者此為對治相違苦由不能無衆生想故相違時即生疲乏今顯示人法無我故尚為一切衆生行施云何於彼而生瞋心言如來是真語等欲令信佛語故能忍於中真語者顯世諦相實語者顯依世諦修行有煩惱清淨相如語者即第一義諦相不異語者依第一義修行無文誤作有煩惱清淨相為遣如言起執故故說如來所得法無實無虗無實者如言說相非有故無虗者不如言說自性有故譬如有人入暗者示乏受用苦對治若為果報布施則著於事於彼喜樂等受不解出離猶如入暗不知所趣若不著事行施如得日光見種種色隨意所趣也頌曰能忍於苦行以苦行有善彼福不可量如是最勝義離我及恚相實無於苦惱共樂有慈悲如是苦行果為不捨心起修行及堅固為忍波羅蜜習彼能學心修行利衆生如是因當識衆生及事相遠離亦應知假名及陰事如來離彼相諸佛無彼二以見實法故天親釋曰謂此雖苦行同於苦果而不疲乏以有忍波羅蜜故謂彼岸有二義一者清淨善根體故二者功德不可量故而言即非者無人知彼功德岸故是為得第一法此苦行勝彼捨身以離我等瞋恚相不但無苦兼亦得樂以有慈悲故我於爾時無我相等此明慈悲心相應故若不離我相即彼菩薩見苦行苦欲捨菩提故說應離一切相此為未發心者防此過故頌言為不捨心起等者謂為何等心不捨菩提起修行相故言為忍等即第一義心已入初地得羼提故是名不住心如經應離一切相若心住色等則不住佛菩提此明不住心行施即起行方便以檀攝六故云何為利衆生而不住衆生事故言說一切諸相即是非相頌言修行利衆生等謂利益是因體故當如是而識亦應不取衆生相事故頌言假名及陰事等謂衆生假名及彼陰事皆非相故即衆生非衆生以皆無實故如是明人法無我遠離一切相故言諸佛無彼二以見實法故若彼二實有者佛應有二相以如來實見故二相非有唐譯大同功德施曰若一切佛法中般若為上者何用勤苦行餘度邪為此顯示般若亦攝餘度經言非波羅蜜者離分別心故我昔為歌利王等者謂若有我等想它來犯己必生瞋恨若無分別是思癡心癡心作因瞋念還起孰能不校以不校故證知無想亦非無想者謂非愚癡之無想不能觀察應作不應作故亦是離於想無想染著分別此言一時而已復欲顯示餘時攝持故則曰又念過去等謂於往昔已斷我想皆由般若攝持力故亦攝菩提故言菩薩應離一切想等以離諸想得菩提故又言不應住色生心者應以無所住心而住菩提故言如是住者即為非住不出二諦故經言不住色布施攝持餘度者三施攝六已如前說檀離三事即是般若餘攝五度其義亦成又五度若離般若如闕目無導復為顯示彼方便故言為利益衆生者或念若不住法而行布施云何利益衆生故言一切衆生想即非想亦依二諦說故謂衆生異陰即陰第一義中皆不可得此顯遠離智及所知二種分別皆無性故如來證了諸想永除斷疑八上卷止此會解曰此明忍度文一也而所以釋者三或作能忍苦事釋或謂雖行苦行而不以為苦釋或作般若攝持五度釋所以於苦能忍以其達苦無苦不得而惱亦忍無忍相安之而已苟為無本則強忍爾夫達苦無苦者謂無我人等相故雖隨順行於苦行而不以為苦方且慈悲樂而行之其不以為苦果明矣非住般若其能至是哉故知由般若故攝餘五度所以行於五度無非般若故從本言之謂皆般若可也從行別攝亦謂五度而實三說其趣一也如前離違順二障可謂難矣而能離所不能忍復難於是故次明忍辱又前捨內身若不離相安忍則不能成捨身等事故明忍所以離障是亦承上言也抑於怨親有所礙者則不能發菩提心故引往怨害所以資發也故曰菩薩應離一切相等言不應住色生心者前以明無相施此以成忍辱言雖同而意別又曰若心有住則為非住者言此心不可以有住也有住則非所以住般若故以非住反責住心與前無住釋住蓋亦相顯爾是故佛說菩薩心等以前無住相文結顯而已使為利生而行施者則不復於衆生起瞋恨心是即布施為忍辱理無二也以其了達相即非相故曰如來說一切諸相即是非相推相非相以及衆生者亦以其理一也惟其理一則不見有衆生為可瞋害亦不見我為瞋害者是我與衆生平等一相無非般若終始一章皆成此理疑天親曰此中有疑於證果中無道云何於彼果能作因為斷此疑如經經須菩提如來是真語者如前引論無著文如上云云頌曰果雖不住道而道能為因以諸佛實語彼智有四種實智及小乘說摩訶衍法及一切授記以不虗說故隨順彼實智說不實不虗如聞聲取證對治如是說天親釋曰謂彼境有四故如來說四種語以實智不妄說佛菩提即真語不妄說小乘四諦即實語不妄說大乘法無我真如理故即如語不妄說授記事如彼三世不差故即不異語經言如來所得法無實無虗者故偈言隨順彼實智等謂諸佛所說法不能得彼實證如所聞聲無如此義故無實而隨順彼證法亦得實智故無虗言如來所得法者以依文字說故既曰如來是真語者復言無實無虗故曰如聞聲取證等唐譯曰然諸如來與真見相應故果不住因如何得見是彼果之因故答如經餘文大同功德施曰佛離一切想證法無性世間以何而信知耶故曰如來是真語等謂以四語故能顯證實離想如世間求名利者於上人法未證言證佛異彼故說真語復有情多矯妄言先得神通離是故說實語又有得世間定者心暫不生言我證涅槃離此謬故說如語此取如是義非隨如之義云云若諸凡夫於乾城等作城等取著是名異如佛證不誑性故名不異如語復次真等亦如次對四諦云云如來證知是以能說說而不知無是處故或念佛離一切想云何言八正道是實入水火等為妄則有分別故言無實無妄又如來證第一義說性本無生無生故不有云何名實既無生則無滅是故非妄非實非妄於何生分別想但所說文字性是有為故非實依而證實故非妄斷疑九會解曰依無著釋義直勉信遣著而已據天親述疑則曰云云是因果不相到則果時無道道則因義因時無果云何而言道為果因耶偈則曰云云是因果雖不相在而實相由以成因果且以四語故知因果義成各有其旨不容去取也今復通為之說曰夫四語若意其聖人之言與凡夫異凡夫則口業有四佛既異彼即不妄言故真不綺語故實不兩舌故如不惡口故不異又克就聖人言之則佛有四辨謂法義辭樂說即法無礙故真辭無礙故實義無礙故如樂說無礙故不異謂雖樂說無盡而未嘗異也抑又有云欲知智在說而智有三謂一切智即空故真道種智即假故實一切種智即中遮故如即中照故不異其旨雅合也而秦本加不誑語謂以真實等語施於人所以不誑即總上四語諸論存別置總故略什譯以法兼人所以加之又言於法無實無虗者恐因上語一向謂實言想不忘故重拂之其著苟亡則與實無異又無著約二諦釋二俱言有煩惱清淨者次文恐誤今謂依世諦云有煩惱清淨為實可也依第一義若亦有者何名不異故知誤矣唯文之信說未免迂疑天親曰復有疑若聖人以無為真如法得名者彼真如一切時處有云何有住不住心而有得不得耶為斷此疑如經經須菩提若菩薩心住於法等如前引論無著文如上云云頌曰特及處實有而不得真如無智以住法餘者有智得暗冥愚無智明者如有智對法及對治得滅法如是天親釋曰言一切時處者謂三世衆生實有真如法何故不得以彼無智心住於法不清淨故若有智者心不住法是故能得故佛以清淨真如得名住心則不得佛菩提故頌言暗冥愚無智等謂如明暗相似法故暗喻無智日光喻有智有目者如得對治法故夜分已盡如所治暗滅日光照明如能照法現前故唐譯大同功德施曰若所證法無生無性非實非虗是即諸佛第一義身以此為因三身滿足菩薩何故捨所證法行於事施邪為遣此疑經曰云云此明暗喻示有住無住過德之義云云如人有目者待無生忍也夜分已盡者捨於果愛也日光明照者決定了知諸法無性也見種種色者悟一切法不生不滅也菩薩如是行不住施速成正覺得大涅槃斷疑十會解曰斷疑文一也所以述疑則不同無著以真如遍有而有得不得者是固心有住不住之異良以菩薩根有淺深教有小大機有利鈍於是心有所住者則迷真如背菩提故不得也心無所住者則悟真如須菩提所以得也雖然而真如遍有之性何嘗述悟向背哉若功德施所述則所證法理性具足自可為因而反取彼事施者是答同而意別意謂有住之施非今所取今所取者無住相施還同彼所證法故曰如是行不住施等故知取與不同文相亦異此既辨其住不住相使修者知所取舍則功德彌深故復述歎持經之盛所歎雖同所以則異人不見此便謂繁芿豈能深知佛意哉經須菩提當來之世止果報亦不可思議論無著曰此下第十四離寂靜味亦為離缺少智資糧障故此中為離三摩提攀緣顯示與法相應者有五種功德一如來憶念親近二攝福德三歎法及修行四天等供養五滅罪對經云云於中歎法言不可思者唯自覺故不可稱者無有等故言為發大乘最上乘說者成前不可稱義以餘乘不及故最上二障淨故最勝歎行中言如來知見者總說也不可思不可稱等解釋也荷擔如來者謂以肩荷如來重擔故滅罪中言輕賤者此毀辱事有無量門當得菩提者顯示滅罪故我念過去等顯示威力故前此所說出生無量阿僧祇福者顯其威力熾然以具足為多此中言阿僧祇劫所有福聚遠絶高勝更過前故若我具說者顯示以福多故或為狂因或得亂心果畢竟何人能說故曰當知是法門等即彼福體及果報不可測度故頌曰於何法修行得何等福德復成就何業如是說修行名字三種法受持聞廣說修從它及內得聞是修智此為自淳熟餘者化衆生以事及時大福中勝福德非餘者境界唯依大人說及希聞信法滿足無上果受持真妙法三尊重身得福四及遠離諸障五復能速證法六成種種勢力得大妙果報七如是等勝業於法修行知天親釋曰初偈示彼修行凡徵三義次名字下以次釋三義釋初句者謂於彼名字得成聞慧此有三種一受二持三者讀誦故云受持聞廣說又不出二種修行謂受持修行依總持法讀誦修行依聞慧法如經云云言修從它及內者謂此修慧從它聞法及內自思惟次第而得此二並自行故言此為自淳熟餘則為化衆生廣說法故以事及時大等正示現校量釋前得何等福德句謂是捨身福德即一日時捨多身故事大也復多時故時大也而聞經之福復勝於前非餘境界等三行偈次釋成就何業句如經有不可思議等示非餘境界唯獨大人是為住第一大乘衆生說也又說大乘最妙乘者示希聞者能信法故非彼樂小之所能聞謂以不可思議文句得不可思議福德滿足性故皆得成就等示現受持真妙法故即能荷擔義在在處處供養者示尊重身成就無量福德故為人輕賤者示現遠離一切障有大功德故於然燈佛前等示速證菩提法故當知是法不可思議者成種種勢力得大妙果報故凡成就如是功德者於彼修行能知是法也或有人聞等以果報勝妙示非思量智境界故唐譯作文義法三正行以釋其文文謂受持等三多聞攝故義謂從它及己聞思得其義故法即不可思議以下文是偈義大同文稍異爾功德施曰此一切法修行中有自他二利自利復有教有義教謂受持義謂思惟利它者謂為人演說如經於此法門等此中無量福聚者如日三捨其身等修行任運果者謂從初至果獲諸功德凡十種德謂魔及異道不能沮亂一功德大故殊勝無等二堅牢福果三最上法器四圓滿資糧五能荷難勝六深大信解七福因之處八拔一切罪九速疾證地十一一對經云云總顯持經力勝也會解曰無著以此文為離寂靜味及少智慧資糧者殆文外之意自非聖師智眼高明其孰能與於此由前文言忍離諸苦以離相故心不得而動若唯不動未免味著於靜安能發智成就資糧哉所謂受持讀誦者蓋不止誦持而已是必與法相應智契於佛為如來所知見故其成就功德如此論言為離三摩提者定也攀緣者散也雖定散不同其皆不可著為資糧入道障一也故舉一日三捨事時兩大校其勝福雖智契在修而所契之妙本於經旨故曰以要言之等為發大乘最上乘說者發謂發起大及上乘衍教兼圓之異而說是法則因經發智固其宜也又況廣為人說亦復稱是是人則為荷擔阿耨菩提者以如來重任與之所謂為如來使者是也何以故下反以樂小法起我見者為不能顯彼能者必其發大乘離我見者也又曰在在處處者復以人法交顯其勝宜其持說所在如是嘗見世有持經而得輕賤者故推先世罪業以釋之苟如經所明則應墮惡道者重也為人所賤者輕也由持經故以輕易重不亦經之冥應乎而世人昧乎三世業理徒見其迹不能無惑因得以解之然則輕賤持經者其報應宜何如謂有則反生彼罪謂無則理復不可此姑置之不必計也前以日三捨其身在凡我之未足為麥信猶可也而復以值佛校量信之為難故論有速證菩提之釋是佛不如法亦一往爾無得以優劣論也若具言其福非凡小境界聞者必疑而致狂惑究言經所說義若果報之福非分別所及者皆即般若自性故也結顆之文至矣舊於此下設第十一疑却以次文為第十二復別立第十三疑有疑佛疑法今謂論無起疑斷疑之文不應別立置是可也經爾時須菩提白佛言世尊善男子等止三藐三菩提心者論無著曰此下第十五於證道時遠離喜動亦為遠離自取故何故復發起初時問也以菩薩將入證道自見得勝處作是念我如是住乃至滅度衆生為對治此故發問云云世尊答言當生如是心等又曰若菩薩有我相等為顯有我執或隨眠等我取為對治故言實無有法等頌曰於內心修行存我為菩薩此即障於心違於不住道天親釋曰三種修行此復重說者謂若菩薩於前三種生如是心言我住菩薩大乘我修我降伏等即此分別障於菩提故曰於內心修行等障於心者是即障於不住道心如經實無有法等釋也唐譯云云功德施曰欲具顯因清淨故復言發菩薩乘等謂所修因非但離於三事相想即名清淨要當遠離我住我修我降伏心方得淨故如經云云謂第一義無有衆生得般涅槃亦無有法名為菩薩發心住果等於無有中而起有想是顛倒行非清淨因會解曰如前明住既過寂靜復離少智夫過寂靜則或動離少智則或喜喜動為障何由寂滅現前故菩薩將入證道必明離障有如合宗離似道法愛是也抑由前文重重遣著不住於法顯持經之勝亦應無住等心故此復宗發問云云苟心相未忘則或不免有自取之過故天親釋曰上教住修降伏恐菩薩實生是心障於菩提故因問以釋使必無障然後為得方其未發心則不得不生如是心亦既已發心則不得不遣如是相故知不住而住住而不住則降伏與無降伏理在其中而與前文問答異者前直問住等此復問其所以住故問勢有異又前答從別故住心降伏各言之此則從合但言發心度生而已蓋發心等通行也住及降伏別行也以通酬別上下之文顯矣何以故下還以菩薩有我相等反顯無住所離雖一能離不無淺深前猶居信行地此當淨心之始故或謂的從智識所起異者既曰智矣豈復起見乎但可言起見者識能離者智雖淺深不同其名不可易也疑天親曰此中有疑若無菩薩云何釋迦於然燈佛所行菩薩行而得授記為斷此疑如經經須菩提於意云何如來於然燈佛所止是故名一切法論無著曰此下第十六為求教授亦為離無教授故謂若菩提法可說如彼然燈所說者我於彼時便得菩提然燈如來則不授記言我得等以彼法不可說我於彼時不得菩提而得授記又彼法不可說者經言如來者即真實如故如故清淨則不可說故說清淨如等猶其真金言無有變異或言然燈佛所於法不得菩提後時自得者為離此取故故言是人不實語等又言於是中無實無虗者顯示真如無二故謂以言說故不實而彼菩提不無世間言說故不虗言一切法皆佛法者謂顯一切法如清淨故遍一切法又為安立第一義故言一切法體不成就故曰即非一切法等中卷止此頌曰以後時授記然燈行非上菩提彼行等非實有為相彼即非相相以不虗妄說是法諸佛法一切自體相天親釋曰謂於然燈佛時非第一菩薩行故無法得菩提若已證菩提則不授後時記故曰然燈行非上謂於彼時行未成佛也若無菩薩即無諸佛有如是謗謂一向無如來為斷此疑故經曰如來者即實真如故謂實則非顛倒義真如者不異不變義又經曰若有人言者謂若實有菩薩行如是如來得菩提者此為虗妄若言如來不得菩提是亦為謗為斷此疑故言無實無虗謂得彼菩提故無虗非實有為相故無實謂五陰相故曰彼即非相相等者謂彼於色等非相非無菩提相以不妄說故是法諸佛法者謂一切法皆佛法是如來所得法此一切法以真如為自體故不住色等相故非法如是諸法非法即是諸法唐譯大同功德施曰復次疑者若無菩薩發趣大乘則無有因證於佛果云何世尊然燈佛時而得授記為遣此疑如經云云謂佛於往昔證真實時不見少法是無上菩提因體以無所得得授尊記故言如來者即真如無所得義須菩提復念我雖於此無疑者有人言佛於然燈佛所不見有法為實得菩提邪故言於是中無實無妄夫妄實生於有得有時言實壞時知妄無所得中此二俱遣若復有言如來但證無所得者佛法即一非是無邊故言如來說一切法皆是佛法佛法者謂無所得不見一法有可得性是故一切法無非佛法又曰一切法即非一切法者謂無生性即如來藏性故而言一切法者於無性中假言說故斷疑十一會解曰論以此文為求教授正言將入證道故如前離喜動則入證先容若非如來教之授之亦無以發其證入之妙故於是却指然燈佛所有法可得菩提為問所以引往示今也而以無法可得授記為答則極於理而已通言有事理因果之義以事則非記不佛在因必藉於師保謂亦有法可也以理則悟不由它至果乃稱於獨悟謂無得可也今從初義以徵釋則曰有法得菩提邪從後說以決答則曰如我解佛所說等故佛印證其說曰如是如是雖通二義理則無得由是反顯結成之則曰若有法等謂若有法得授記者則非無為殊乖一如寂滅之理非所以致成佛之道是不足與記也以實無有法等則結成其說也然其理猶未明則又徵釋曰何以故如來者即諸法如義夫如即真如真如故平等所謂於如實際中而成正覺豈有它法為所得乎故論曰真如者無二故若有人言下重遣得不得相終於無實無虗無實則無得無虗則無不得又無實故非有為之相無虗故非無真如之相故曰如來說一切法等言一切法皆佛法故無虗一切法即非一切法故無實無虗無實是名一切法是一切法非復一切法亦一如而已矣偈言以後時授記者以今言之即初二句頌疑次二句頌釋謂若以授後時記不即得菩提者則行非無上何以致菩提得授記邪故次釋云菩提彼行等謂彼得菩提記與彼行菩薩行皆非有為相則其疑釋矣然而論釋有異云者恐譯者惑於頌意不善其文故也此尤當知之疑天親曰此中有疑若無菩薩者諸佛不成大菩提衆生亦不入大涅槃亦無清淨佛國土何得諸菩薩發心度生清淨佛土邪為斷此疑今開為二疑如經經須菩提譬如人身長大止無我無人無衆生無壽者論無著曰此下第十七為入證道顯示得智離慢故得智有二一攝種性智二平等智由得智故生如來家決定紹佛種性此為攝種性智平等智者謂至得身及成就身以得畢竟轉依故於是有五種平等智一粗惡平等二法無我三斷相應四無悕望心相應五一切菩薩證道平等得此智故現攝一切衆生大身於彼身中安立第一義故非自非它故經言如來說人身長大則為非大身等是為得智云何離慢經言我當滅度無量衆生等若言我是菩薩則為慢者非實義菩薩為顯示此故經言佛說一切法無衆生等謂若有是念則不得妙大身也頌曰依彼法身佛故說大身喻身離一切障及遍一切境功德及大體故即說大身非身即是身是故說非身天親釋曰大身者示畢竟遠離二障具足法身故此復有二義一遍一切處二功德大故言功德及大體等遍一切處者真如與一切法無差別故言非身即是身者如經佛說非身是名大身謂非身者無有諸相故大身者即真如體故唐譯大同功德施續上文曰是故世尊乘次開顯經曰云云妙大身者謂空性身隨其所在而不異故一切衆生咸共有故如說一切衆生有如來藏等云云須菩提為欲闡明妙大身是空性義故說人身妙大等非身者謂以色身依實義說無生性故名妙大身非色身也言菩薩亦如是者謂除能度所度一切分別菩薩修因方得淨故復為成就無分別心故曰佛說一切法無我人等第一義中皆無有故斷疑十二會解曰譬如人身長大者文似孤然意其亦由上文無法得菩提即法身義故取世間大身為喻以譬從法謂非大身可也故無著以入證道得智離慢言之謂得般若智故顯出至得法身及能成就功德身轉染為淨依於法身從體起用即能現攝一切衆生身所謂普現色身是也又謂攝種性智者即自報上冥之智也平等智者即攝一切衆生身下契之智也是智與法身合則為體義與應身合則為用義故說五種平等智與一切凡聖身等謂粗惡即六道法無我即二乘三四即似位菩薩而有偏圓之異約名釋義可知五即證道菩薩以同彼故皆言平等所現雖異能現不殊而以第一義故非自非它以全法身故非它同於九界故非自非自它故說名非身夫既內得非相身外同普攝身則不復起我度衆生想衆生得我度想復何慢之有所謂實義菩薩者如是而已故曰佛說一切法無衆生相等即其理也而天親以離障釋法身蓋與得智左右之異又以遍一切處為真如無差別義即所謂於彼身中安立第一義故知其致一也不名菩薩者以起衆生等相故又曰實無有法名為菩薩者以無我等相故然則菩薩諸法是與非是初無定實唯我等相有與亡爾一經之旨要莫若此疑文合前段經須菩提若菩薩作是念止如來說名真是菩薩論無著曰此下第十八上求佛地復有六具足義攝轉依一切具足一國土淨具足止六心具足一國土淨具足修三摩鉢帝故經言我當莊嚴佛國是不名菩薩者謂於共見正行中轉故為斷彼見安立第一義故經言即非莊嚴等又曰若通達無我法者謂人法二種無我於是得二種正覺故說名菩薩若言我成就者即人我取我莊嚴國土者是法我取則非菩薩頌曰不達真法界起度衆生意及清淨國土生心即是倒衆生及菩薩知諸法無我非聖自智信及聖以有智天親釋曰此下為斷疑故謂若起如是心即是顛倒非菩薩也起何等心名為菩薩如經通達無我法者名為菩薩故頌言衆生及菩薩等謂彼凡夫及菩薩以自智信若世出世間智知諸法無我者皆名菩薩唐譯大同功德施曰我當莊嚴佛土不名菩薩者深著因故於色等聚所成佛土如是取故即非莊嚴者實義無生故是名莊嚴者俗諦言說故通達無我者離一切想因清淨故斷疑十三會解曰無著以此文為上求佛地者若生起次第正當佛果以意則不離因心而求佛地故曰上求凡明六具足義不出佛果地上身土福智及彼三業以攝轉依故皆清淨具足即上所依法身身也國土淨具足者土也前明福智者資糧也故能顯於法身今明福智者成德也故能依而起用即身語意業皆具足清淨所以為果地法而言三摩鉢帝者謂由修是定故莊嚴佛土苟於是起見即向所謂共見正行也嚴土雖是正行而為共見所轉為斷彼見故安立第一義故曰莊嚴佛土者即非莊嚴維摩所謂隨其心淨即佛土淨是也然皆以無我為本則又曰若菩薩通達無我法等頌言生心即是倒者謂凡生心動念無間善惡凡聖法非法等但有一念未忘皆為倒見又頌曰非聖自智信者謂非聖即凡夫以自智故信能知無我而已不同及聖即是菩薩以有智力故知復於無我建立諸法凡今所謂上求佛地發心度生嚴淨佛土皆依無我心中施設雖無我言同而所以淺深有用無用則異矣疑天親曰復有疑前說菩薩不見彼衆生不見我為菩薩不見清淨佛土以不見諸法名為諸佛故或謂諸佛如來不見諸法為斷此疑如經經須菩提於意云何如來有肉眼不止未來心不可得論無著曰此下第二為無上見智淨具足故於中二種一見淨二智淨如來不唯有慧眼為令知見淨勝故顯示五眼略說有四種攝謂初色攝有二種即法界修果謂法界依報色及修得果色此為五眼粗境界故二第一義諦稱以智力故世智不顛倒轉故此攝在先正言由第一義空智力故不為世智顛倒轉故在先也三世諦攝於中以彼法為彼人說是名法眼四一切種一切應知攝即一切種無功用智說名佛眼是為見淨如經恆河中所有沙等此為智淨於中言心住者謂三世心有若干種所謂染淨心等是中安立第一義故故說諸心住皆為非住乃至三世心不可得謂過去已滅等又為示中證此故安立見為教彼彼衆生寂靜心故安立智於智淨中說非心住而見淨中不言眼即非眼者以同一住處故如智淨後安立第一義故初亦得成就頌曰雖不見諸法非無了境眼諸佛五種實以見彼顛倒種種顛倒識以離於實念不住彼實智是故說顛倒天親釋曰此為斷疑故雖不見有諸法名之為佛而亦說我知彼種種心住故曰非無了境眼但佛見五眼皆實以非顛倒能見顛倒故何者為倒故頌言種種顛倒識等謂彼種種心緣住故名六種識差別顛倒以離於實念者如經如來說諸心住皆為非住顯示離彼四念處故故言不住彼實智又住名不動根本如是不住即不住於相續顛倒而不斷行因如經過去心不可得等以過去過去乃至現在虗妄分別故皆不可得彼無三世觀故心住顛倒諸識虗妄唐譯存梵音如經云如來說為無陀羅等以謂彼有三名共目二義皆得名持亦流注義由無持故心即流散等自謂重譯窮理之說今謂陀羅本應翻持正言若無持即流散非謂於一梵語兼此二義正如向言聚義有二亦一時誤見之失餘文意同功德施曰若清淨因離諸想者何故此中說具五眼如經云云為示佛眼於諸境界無不了知故此有衆生數境非衆生數境如經所有衆生及恆河沙世界等是也若干種心者欲樂不同故住者相續而轉故或作是念心若住者斯應有體故說非心住等以第一義無相續故如經過去心不可得乃至現在不住亦無形故如是五眼都無所得是佛境界斷疑十四會解曰嚴土非土謂見而無見可也無見而見謂如來佛眼可也而此兼言佛有五眼者論曰為令知見淨勝故顯示五眼然佛特名慧眼者為對智淨言之但明其一而不明四無以見其淨勝也抑佛眼體也四眼用也佛眼具四眼用故兼明之所以彰如來五眼具足見智俱淨也又論明四種攝者謂色攝則通為五眼所見境界望後智眼所以為粗猶大論曰句初因緣生法也餘三攝即三智亦慧眼等三即後三句也惟其在一時中見無前後則智融而理明此其見淨也所以能知恆沙世界若干種心者智淨也夫能知之道有二一由定故知如它經云云二由空故知如今文所謂如來說諸心皆為非心凡三世心相皆不可得則空而已以智空故無知無知而無所不知此恆沙世界所以悉知也又若干種心者末也皆不可得者本也得本而知末故凡有心則無不知也亦是以不可得心知心不可得則彼此能所一爾此三際心皆不可得無別道理只缺承當但向古人焚疏鈔處看便是前後際斷不然守株待兔詎可得乎而於五眼獨不遣非者非無此理以後智淨例之可知故曰同一住處故又曰如智淨後安立第一義故初見淨亦得成就正謂是也亦惟此文存而不遣照上下文則顯諸法不偏蕩立一經之旨渙然理融或謂此五眼文不可作通礙等差別頌者此亦不害蓋頌據相別不妨性融安得而非邪若以天親斷疑言者如來雖無所見不妨五眼具足故曰雖不見諸法非無了境眼謂不見而見亡其所以見云不見爾然於如來所見無非真實故能見彼顛倒而不自顛倒是為如來之五眼矣疑天親曰復有疑向說心往顛倒若如是福德亦是顛倒何名善法為斷此疑如經經須菩提於意云何若有人滿三千大千世界止如來說得福德多論無著曰此下第三為福自在具足故經言若有人等於中亦安立第一義故言若福德有實等頌曰佛智慧根本非顛倒功德以是福德相故重說譬喻天親釋曰此何故依福德重說譬喻為示心住雖顛倒福德非顛倒故言佛智慧根本如經說若福德有實等意明有漏福德聚是其顛倒所以不說福德聚又福德聚者對非福德若非福德聚如來則不說為智慧根本是故福德即福德聚唐譯大同功德施曰聚者蘊義假名不實實即非蘊於何說聚以第一義無積聚故俗諦中有言說故斷疑十五會解曰前以心住為顛倒此以福德為自在心若果住則福德不得為自在福若有相則心不得為不住此無著所以明福德具足而天親所以為斷顛倒疑故曰若福德有實如來不說得福德多說福德多者知其非有相之實也則又曰以福德無故如來說得福德多然則秦譯之所謂多即魏譯之所謂非聚是故謂實取相之福雖得而不多稱性無住之福雖多而非相故言佛智慧根本正取緣能資了之義又唐譯曰正覺智所持是皆依如來無相之智行菩薩不住之施不見我人了無性相非無福德福德無故無之一字深可思之多而非多假名相說疑天親曰復有疑若諸佛以無為法得名云何諸佛成就相好而名為佛為斷此疑如經經須菩提於意云何佛可以具足色身見不止是名諸相具足論無著曰此下第四為身具足故於中復有二種一好具足二相具足並如經云云以安立第一義故故如來說非具足等頌曰法身畢竟體非彼相好身亦非相成就非彼法身故不離於法身彼二非不佛故重說成就亦無二及有天親釋曰為斷疑故如經說非色身相好得見如來故頌云云謂彼法身畢竟體非色身及諸相成就以非彼法身相故此二非不佛者以即彼法身所有故故曰不離於法身是亦得說如來身成就相好故此二亦得言無如說非身相成就亦得言有如說諸相成就故言亦無二及有云云唐譯曰若言如來非集道所成如何如來說有相好為除此疑故言不應說色身圓滿等觀於如來餘文大同中卷止此功德施曰復次疑曰若第一義佛境界是無所得色相如來豈亦非有為遣此疑經曰云云此顯示見佛法身依實義故即於色相而見法身非具足者是法身故如說無生性是常住如來等斷疑十六會解曰以能嚴德備必有所成之身由法身理極宜無待對之相此如來相有無所以難也如向明福智具足即能嚴之德而法身理極不容有相故佛問須菩提佛可以具足色身見不答言不也無著直以安立第一義釋故曰如來說具足色身即非具足色身則相即非相非相即相而已矣天親又以斷疑釋故頌曰法身畢竟體等其意不過曰佛有法身色身克體言之法身非相而色身有相相即而說則二不相捨此猶分別之說理而言之色身亦佛也而與法身不即不離以不即故無相好之二以不離故非無有二故曰不離於法身等功德施言依於色相而見法身非具足者是法身故斯言盡之矣然則福智所嚴者色身之相也理極所無者法身之相也雖曰有無理無異致諸論釋義雖或異同大體無別疑天親曰復有疑若如來身相不可得見者云何言如來說法為斷此疑如經經須菩提汝勿謂如來作是念止是名說法論無著曰此下第五為語具足於中亦安立第一義故經云云頌曰如佛法亦然所說二差別不離於法界說法無自相天親釋曰為斷疑故如經若人言如來有所說法等頌言二差別者謂一所說法二所有義而言無法可說是名說法者謂不離真如法界故若離則無自相可說故曰說法無自相唐譯大同功德施曰復次若第一義佛境界及色相身皆無有體豈具足衆德言說相身亦復無有為遣此疑欲使定除有說執故故曰若人言如來有所說法等謂說無自體則不見內外漏無漏法少有真實而可說者斷疑十七會解曰有身則有說苟為無身說復何有無著以此文為安立第一義直彰無說而已而頌則曰如佛法亦然是以法例佛皆不得而有也雖然而一代時教所說文義二種差別此復何耶故曰不離於法界等謂雖言說不離無說之理若捨法界亦無說法自相可得此所以無說即說說即無說是說法之至者故曰無法可說是名說法維摩曰其說法者無說無示其聽法者無聞無得皆此之謂也執有執無之疑於是遣矣疑天親曰復有疑若言諸佛無所說法不離法界亦無有者何人能信此法為斷此疑如經經爾時慧命須菩提白佛言世尊頗有衆生於未來世聞說是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來說非衆生是名衆生文見魏譯論無著曰此下第六心具足於中復有六種淨一念處淨乃至六行住淨念處淨者如經云云此於衆生中顯示如世尊念處故彼非衆生非不衆生者顯示二諦故亦應云是人即為希有第一顯示第一義不共及相應故頌曰所說說者深非無能信者非衆生衆生非聖非不聖天親釋曰謂若信此經彼人非衆生非不衆生非衆生者非凡夫衆生非無聖體故非不是聖體衆生以有聖體故故言說非衆生是名衆生唐譯曰非衆生者非餘衆生不與聖性相應故非非衆生者由與聖性相應故亦是望凡夫性故非是衆生由望聖人性故非非衆生功德施曰復欲顯示所說信受者難故云何非衆生即蘊異蘊推求其體不可得故非不衆生者以俗諦依於五蘊業果相應施設故若加此段自為一疑則當十八今依秦本亦且從略會解曰舊論此經六十二字有無即此章也今謂此文略不為不足存不為有餘以其所言前文已具言之雖略可也而頌及論釋此當心具足六義之一去則殘缺存之可也但今依什本或別有意亦且從略無著以為顯示如世尊念處者即同如來所契清淨真如是其念處故能於經生信異乎凡小衆生而以世諦言故亦是無為賢聖之衆生故以非不非言之則處乎凡聖之間也餘論同異各隨義焉疑天親曰若如來不得一法名阿耨菩提者云何離上上證轉轉得菩提耶為斷此疑如經經須菩提白佛言世尊佛得阿耨多羅止是名善法論無著曰此下第二為正覺故於中無有法者為離有見過已顯示菩提及菩提道故顯示有二種語謂阿耨多羅即無上語顯示菩提自相及解脫相故彼中無微塵許法可得故無所有次以三藐三菩提即平等語顯示菩提中人平等相以菩提故得知是諸佛第一義中無有高下即無壽命等高下也又言以無衆生等者顯示菩提於生死中法平等相次顯菩提道者如經言修一切善法等說非善法者安立第一義相故頌曰彼處無少法知菩提無上法界不增減淨平等自相有無上方便及離於漏法是故非淨法即是清淨法天親釋曰自下經文為斷疑故示現非證法名得阿耨菩提謂彼菩提處無有一法可證如經云云故名無上頌言法界不增減等釋無上義凡四義故如經是法平等無有高下即不增減故無上又諸佛法身清淨無有勝故無上以無我等故得平等菩提故無上又彼法無我自體真實即自相故無上言無上方便者謂一切善法滿足故若餘菩提善法缺少即有上方便如經一切善法等於中言非善法者謂彼法無有漏故故偈言及離於漏法等言漏即非淨法非漏是淨法是即決定無漏善法也唐譯曰若言如來無法是所覺者云何離後後正覺次第名無上覺為答此疑非是有法之覺方名無上覺故餘文大同功德施曰若第一義境界色身言說皆不可得法身體性豈亦然邪為遣此疑經曰云云謂佛證真實不見少法有所得故說名阿耨菩提以是法平等無有高下故無所得何故平等以無我人衆生等故如生無我即法無我故平等無二此無得理以何因證故言一切善法等善法有體云何能證無所得理故曰善法者如來說非善法謂第一義無生性故則無所得言善法者俗諦言說非真實義斷疑十八會解曰身說所證其理一也空生以向身說即非身說於是例問云云佛答亦云實無有法等則無上菩提得而無得若言有得則非平等不名無上故曰是法平等無有高下謂是菩提無涅槃之高無生死之下無聖人之得無凡夫之不得此據理性以言平等若約修德非無善法得菩提者但無我人等見則所修離相故曰如來說非善法是名善法亦不乖於無得也論以初文為顯示菩提相約二種語明義謂無上語則顯示菩提自相及解脫相無少法可得故皆無上言平等語則顯示菩提若人若法皆平等也以次文為示菩提道者然道即菩提此謂菩提之道即善法也而言非善法者亦安立第一義故天親述疑言離彼上上證法轉轉得菩提者上上之言對後後說謂以位次論之即破一品惑證一分菩提望後後位是為上上證法故還以後望前則離上上證轉轉得後菩提雖有離有得實無法無證此即斷疑意也餘不別釋疑天親曰復有疑若一切善法滿足得菩提者則所說法不得大菩提是無記故為斷此疑如經經須菩提若三千大千世界中止是名凡夫論無著曰此下第三為施設大利法於中為安立第一義教授故經言汝勿謂如來作是念等謂如來若以爾炎而知言有衆生者則為有我取為離此著故故曰如來說有我者即非有我但小乘凡夫有如是取故言凡夫者如來說即非凡夫頌曰雖言無記法而說是彼因是故一法寶勝無量珍寶數力無似勝無似因亦然一切世間法不可得為喻天親釋曰為斷此疑故謂所說法雖是無記而能得大菩提以離所說法不能得故是故能為菩提因又言無記者此義不然汝是無記而我法是記故言一法寶等言數力無似勝等者謂於前福德此福為勝故一者數勝二者力勝三者無似勝並如經云云四者因勝此因勝彼因故唐譯以力似曰勢類謂如人勢力有強弱故如人品類有貴賤故不可比數餘文大同功德施曰何故復此校量邪今修行者心勇進故斷疑十九會解曰既證覺道而後施設大利故無著以為施設大利法也夫大利法莫若此經持說功德故重舉大千七寶施福以為較量文以因況果即果上施設化度衆生復大於是若使如來如彼所知言有衆生度者即有我取為離著故則曰如來說即非有我所謂安立第一義教授者如是而已若天親則仍上為疑謂若善法滿足得菩提者而所說法無記應反不得邪斷此疑故引偈答言言說雖是無記而得為因此順問答也又曰汝是無記者指彼疑者疑而不決則無記爾亦可謂汝疑此法為無記爾若我所說離相妙善何謂無記此違問答也又偈言一切世間法等者約四勝義以釋校量其文可知疑天親曰復有疑若是法平等無有高下云何如來言度衆生為斷此疑如經經須菩提於意云何汝勿謂如來等如前引論無著文如上云云頌曰平等真法界佛不度衆生以名共彼陰不離於法界取我度為過以取彼法是取度衆生故不取取應知天親釋曰云何斷疑謂乘生假名與五陰共而不離法界以無差別故故言平等真法界是故無衆生可度如經云云偈言取我度為過者謂若如來取五陰中有衆生為所度令得解脫而我能度者是取相過以著彼法故經復言如來說有我等故偈言不取取謂彼本不實是不應取不取而取凡夫取以為生是不取取義在佛言之亦是不取而取取衆生為所度但取而不取爾又凡夫衆生如來說名非生者不生聖人法故唐譯語意稍異云云功德施曰復次疑若如來說非衆生者與餘教相違如有經言無量衆生以得我為善知識脫生等菩故為遣此疑經曰云云無衆生者第一義故又以大悲攝同己故若實有衆生異於如來是所度者如來即有我等取我取者如來說為非取非者不善義能縛衆生住生死故又非者無體性義以無能取所取故而凡夫妄取令彼解故如經但無智凡夫等是知未得聖者各封於我差別生故彼即非生如不善人說為非又又法從緣起無我造作故名非生言生者隨俗言故斷疑二十會解曰文於校量之後而發勿謂度生之語者以前文云是法平等則無生可度因恐衆起是疑故止之云爾空生雖未發言意猶未決故直告以實無生可度偈所謂平等真法界佛不度衆生斯言盡矣夫一真法界本無迷悟尚何生佛之有而孰為能度所度哉若謂有生可度則佛應有我人等見苟為無我知無衆生明矣而如來說有我者但凡夫執我順彼凡迷無我說我爾然則凡夫果有凡夫耶以實言之凡夫亦不可得故曰凡夫者如來說即非凡夫但依世俗說名凡夫第一義中則無有也若知無生說生是亦不度而度所謂雖知衆生無所有誓度無所有之衆生是也是則言衆生有無如來度不各有其致執取則非爾疑天親曰復有疑雖相不可得見如來以非如來法身體故而如來法身以色相比知則如來亦以福相成就也為斷此疑如經經須菩提於意云何可以三十二相觀如來不止如來不以具足相故得阿耨多羅三藐三菩提論無著曰此下第四為攝取法身故於中初偈顯示如所不應見以不可見故是人行邪道者亦曰邪靜以得禪者名寂靜故禪名思惟修思者意所攝修者識所攝覺識所攝故不能見又諸見皆世諦故次偈曰彼如來妙體即法身諸佛法體不可見彼識不能知即示如彼不應見及不應因緣於中初二句謂應以法見佛法者真如義由其以法為身以如為緣故出生諸佛法身故不可見次二句言不應因緣以彼法真如相故非如言說所知唯應自證見實能知故言法體不可見等雖不應以相見應以為因得菩提邪故經言如來可以相成就等云云為離此著故則又曰莫作是念等此明相非菩提亦不以為因相是色性故頌曰非是色相身可比知如來諸佛唯法身轉輪王非佛非相好果報依福德成就而得真法身方便異相故唯見色聞聲是人不知佛以真如法身非是識境界天親釋曰此下為斷疑故謂若有人言福德能成相果則是以相能得菩提者如轉輪聖王應是如來故知不可以相得見佛身也言非相好果報等此明相果非依福德成就而得法身方便異相故謂法身者是智相身非彼福德異相身故若唯見色聞聲是人不知真如法身非是識境界故故云見色聞聲是行邪道則曰彼如來妙體等唐譯大同功德施曰以諸衆生於佛法身多生取著故說色身無性又欲令於色身見法身義故說頌言云云謂有見光明相好及聽受經法文字而言見佛者為除此見故曰是行邪道以色聲性非真實故然則云何見邪故偈言如來法為身但應觀法性法性非所見彼亦不能知法性者所謂空性無自性無生性等此即諸佛第一義身若見此者名為見佛又餘經說無取著見是名見佛今緣法性將非取著以淨智心了知法性故法性非所見既非所見故智不能知如有經說一切法性猶如虗空等與衆物為所依止而其體性非有物非無物寂然無知名為了知名為知者隨俗言說斷疑二十一會解曰經言可以身相見如來者前後凡四出之以文相生起斷疑之別各有所以前直以見言不可此獨言觀故在可否之間則曰云云蓋觀與見異故有與有奪謂以理觀之則可以相見則不可如曰一塵之色咸與理等況丈六之質寧非法身及詰之以相又言其非或恐不善觀者還滯相見故復遮之魏譯加後四句而秦本略者以今言之魏譯理是秦本意深各有其致未易可否然與其理足而義盡孰若意深而有餘所謂但遮所非不言所是其秦本得之矣無著以為攝取法身則法身者在乎所非處而已而天親以為斷疑故不以色相見如來唯以真如為如來此猶分別之說若以三身圓具色相法身非一非異無在不在豈當如是離隔說邪如功德施所論亦可謂知見佛之趣矣疑天親曰有人起如是心若不依福德得大菩提如是諸菩薩則失福德及大果報為斷此疑如經經須菩提汝若作是念如來不以具足相故止得故阿耨菩提是故說不受福德無著以此段連上云云天親以此文屬下論無著曰此下第五為不住生死涅槃故言於法不說斷滅者謂如所住法通達不斷一切生死影象而於涅槃自在行利益衆生事此遮一向寂靜故顯示不住涅槃若不住涅槃應受生死為離此著顯示不住流轉故經言以七寶行施等於中言知一切法無我得成於忍者謂於有為法得自在故無彼生死之我又非業惑力所生故名無我得忍所生福德勝多於彼言菩薩不取福德者正顯示不住生死若住生死即受福德又言不取福德者佛於餘處說應受福德故復以方便說故受而不取受者說有而已取者修彼道故如福聚及果中皆不應著頌曰不失功德因及彼勝果報得勝忍不失以得無垢果示勝福德相是故說譬喻是福德無報如是受不取天親釋曰此下為斷疑故謂雖不依福德得真菩提而不失福德及被果報以能福智二嚴故言得勝忍不失者謂若有人作是念菩薩以得無生失彼福德者為遮此故示現不失更得勝報故言示勝福德相等如經於法不說斷滅相言知一切法無我得無生忍者謂二種無我得二種不生相故是福德無報者無彼有漏報也如是受不取者謂得有漏報故亦受以有漏可訶故不取唐譯曰若言福不證菩提則菩薩福果應斷為釋此故頌曰其福不失亡等餘文大同功德施曰若智亦不能知法性者云何佛以具足相而證菩提為遣此疑經曰云云以顯示法界相義故若相成就是真實者相滅即名為斷無有菩薩見法斷故有生故有斷若一切法無生性則遠離斷常是法界相於此能信解者多於施福如有頌曰若人持正法及發菩提心不如解於空十六分之一或念一切法無生者云何有福德生故經言不應取福德謂非第一義中有福可取故雖不可取福應圓滿不出二諦故云云斷疑二十二會解曰此段初文照上無著所釋合云以具足相故得菩提如來遣之則反其說故曰不以等是疑多上一不字若作天親釋則不為多各有其義兩存可也然無著以不說斷滅下為不住生死涅槃者謂若發心一向說諸法斷滅則似墮涅槃寂靜見為遮是見故說通達不斷生死影象而於涅槃方便利物則不住涅槃也若言行於布施則似著有為生死法為遮此著故說若人知一切法無我得成於忍於有為法而得自在則不住生死也惟其不住生死所以能出生入死惟其不住涅槃所以能安住涅槃是二不住雖在如來而以菩薩言者以因顯果亦寄果示因而福德勝劣不相及者由其受不受異故曰以諸菩薩不受福德等然以餘文言之有受而不取者是受與取異如諸論分別若依今本不受即不取故一向無著則曰如福聚及果中皆不應著是也然則文雖不以福德得菩提而不說諸法斷滅雖不捨福德相而說於法無我得忍為勝所以成福智二嚴良由二皆不住故也疑天親曰若諸菩薩不受果報云何諸菩薩福德衆生受用如經經須菩提若有人言如來若來若去止故名如來論無著曰此下第六為行住淨復有三種一威儀行住二名色觀破自在行住三不染行住威儀行住者經言若來若去等行謂去來住謂餘儀頌曰是福德應報為化諸衆生自然如是業諸佛現十方去來化身佛如來常不動於是法界處非一亦不異天親釋曰謂諸佛化身有用彼法身者不來不去故言自然如是業又言去來化身佛等謂以此明不來不去故如經云云若如來有去來差別者即不得言常如是住如是住者不變不異故唐譯大同功德施曰若第一義無福可取何故餘經說如來福智資糧等為遣此疑故曰云云謂涅槃無有真實處所而至於彼名之為去生死亦爾而從彼出名之為來不來不去是如來義以此顯示無住涅槃雖生死涅槃無有一異而於三界引喻衆生為作利益斷疑二十三會解曰此以當文言之顯如來應化即是法身故於去來而無去來之迹於行住而不見行住之相此所以名法身如來無著以為行住淨謂由全法為應故若行若住無不皆淨依天親承上斷疑則福德所感者應化也以應化則有去來彼不解故謂實有來去是不解知其為法身體無來去故也則又曰如來者無所從來所謂從真如實際中來又曰乘如實道來成正覺是則修性因果皆依一如以如無來去故無從來者亦無所去而言來者順化之義去者反本之義若云如去則是雙林順如而去也亦無所從生名為如來故淨名曰來者無所從來等皆其理也餘論以望彼生死涅槃云無來去者亦無方之說也疑此下一疑論無顯文准功德施曰復次疑者若生死涅槃不可得故無來去者如來豈如須彌山等積聚一合而安住邪為遣此中衆多等有無一合見故如經經須菩提若善男子善女人以三千大千世界止是名法相論無著曰此下第二為破名色身自在行住故於中有二種方便破色身如前說言佛則不說是微塵衆此謂聚體不成就故說名非聚若不爾者雖不說亦自知是聚義何須佛說經言如來說世界非世界者此以無所見方便破名身謂衆生世界故又言若世界實有則是一合相者此界塵並說故有二種摶取謂一摶取即衆生類及世界為一有故差別摶取者以取微塵衆集有差別相故言非一合相者此為安立第一義故又曰即是不可說等謂以世言說故有彼摶取第一義中彼法不可說而小乘凡夫如言說取非第一義經言佛說我見等者顯示如所不分別謂如外道說我如來說為我見又說有此我見是即見攝所以安立法無我如是觀察入三昧時不復分別是為相應方便言發阿耨菩提心者示無分別人於一切法者示無分別法如是知見等示增上心及智皆無分別故即知見勝解謂以智依奢摩他故言知依毗鉢舍那故言見此二依止三摩提自在解內攀緣影象故言勝解初二翻名止觀故能知能見第三恐取等持之義故以三摩提為言若準圓覺則初名奢摩他故名三摩鉢提第三名禪那今次名異彼即同涅槃第三合名優畢叉今言三摩提者名相進退所出不同言如是信解不住法相者正顯無分別義於法相中示不共及相應義故如前說云云頌曰世界作微塵此喻示彼義微塵碎為末示現煩惱盡非集聚故集非唯是一喻聚集處非彼非是差別喻但隨於音聲凡夫取顛倒非無二得道遠離於我法我見即不見無實虗妄見此是微細障見真如遠離二智及三昧如是得遠離天親釋曰碎塵為喻者謂真如法界處非一異如來於彼法界處住故說此喻示煩惱盡顯非一異相故言非集聚故集等謂如塵為末非有聚集物故非一處住非彼差別處可得故亦非異處如是遠離煩惱障盡住彼非一異處又說世界一合相喻者謂若實有物聚集如來則不說微塵聚若實有世界佛則不說三千世界是一合相以彼聚集無物可取凡夫妄取為有非實有故即知是妄故言一合相者即是不可說等又佛說我見等者謂本無我隨言取著計為二見故言但隨於音聲等非彼無我及法若離二事即得菩提故偈復言遠離於我法等見我即不見者謂見我者即不見彼無我以其無實虗妄分別無有我故如來說彼我見如是見法亦爾經言於一切法應如是知等謂若見法相即不見相故見我見法二皆不見此是細障若不見彼二是即見法而得遠離故言見真如遠離又如是知等者顯示世智第一義智及依止三昧得離彼障故唐譯大同功德施曰此中微塵衆多者遣無分一合見非微塵衆者遣有分一合見是名微塵衆者非有分物說之為衆復為遣積聚見故又曰如來說世界即非世界者謂若世界實有即是一合見何故非此一合見邪謂於非有中妄見故言一合相者即是不可說是俗諦相非真實有若第一義一切法本性無生故不可得離於言說而起執凡夫於中妄取若我一向非如教有言我以己為依詎以他為依智者能調我生天受安樂為遣此疑經曰若人言如來說我見等為正語不謂佛說見我者為誘攝諸信樂者故於五蘊隨俗名言非謂真實而佛所見我是遠離性故言即非我見等以離生死涅槃我等一合見得菩提故復欲令其同證故說於一切法應如是知等謂修信解者法想尚不生況非法想即不生於如法不如法分別又曰法想者如來說為非想謂一切法無生性故若無生即非有於何知見以俗諦故說名法想斷疑二十四會解曰無著科此文為破名色身自在行住亦承上言之謂有去來者名色身也無去來者破名色也以破名色身故解脫解脫顯由法身故解脫自在則應化亦自在此與前文異者前為顯相應行相故此以為自在行住雖意各不同其必破名色身一也論以初文末塵方便破色身即外世界色例內身色世界既為微塵則有而非有非有而有亦摶衆塵而為一色既有無不可得則色身執破矣又曰若世界實有者決以世界非世界破名身即世界之名例衆生之名世界既有而非有則衆生名亦非名即名身執破矣破雖在佛執實凡夫所以寄果以破因執也言一合相義亦難曉是應知合多為一為一合相散一為多為非一合相非一合相則為無一合相者則為有有則為凡無則為聖於一合相而有二種如論有二種摶取謂摶取積聚之義所謂摶衆生類等為一世界一也又摶衆塵以成世界種種差別二也既二俱不可得則非一非異如論偈顯非一異是也故以凡言之知合而不知散聖人觀之於合而知散故曰如來說一合相即非一合相又見有合散者凡夫也見非合散者聖人也如曰若見凡法不合不散是即聖人法若見聖法有合有散者是即凡夫法云云是不特知聖凡之分亦見聖凡元只一法本無定實又安立第一義故說非一合相隨世言說故是名一合相抑通言之凡一切法但有待對未會一如皆一合相是則攝義甚通於理極遠此姑置之依天親釋義則碎塵為喻顯非一異相以上明法身所契真如非一異故故有世界微塵之喻然則文言若實有一物聚集如來則不說微塵衆者此言佛說一合相意也以是知言微塵衆者為顯體不成就非實有一合相餘諸文義論釋詳矣今更直釋之經於此後復言佛說我見人見者一由凡夫不了一合相義貪著其事故有我見等執亦由我等見故取一合相故於是破之亦是破上地微細障也二由上言佛說微塵衆顯非一合相故言如佛說我見等亦彰見而非見故復示發心者於一切法亦當如其非見而見如是知見信解則不生法相矣又言法相者覆釋法相亦皆非相而相故知言不生者由本不生非始不生也於是如來反覆發明之旨非不切著而凡迷不解奈何經須菩提若人滿無量阿僧祇世界止如如不動論無著曰此下第三為不染行住於中二種一說法不染以有如是大利益故決定應如是說而無所染云何為人演說等顯示不可言說故不說彼法有可說體應如是說若異此者則為染汙以顛倒義故又不求信敬故亦為無染說頌曰化身示現福非無無盡福諸佛說法時不言是化身以不如是說是故彼說正天親釋曰此雖諸佛自然作用而彼化身說法有無盡無漏功德故重說勝福譬云何為人演說而不名說故言諸佛說法時等謂化身說法時若言我是化佛則衆生不敬不能利物故以不如是說而為正說唐譯大同功德施曰何故復說受持之福欲令衆生畢竟信故經曰如無演說是名為說謂第一義無世出世若法若物少有可說者是名為說會解曰此經始終以七寶施福校量雖世界有多少顯持經福勝一也其所以勝之之說雖不同而出乎般若亦一也無著以此文為說法不染蓋順無說之說是真得般若體故又以不求信敬為不染謂說者能忘於我故天親以偈言化身示現福等知其依化身說法而不言是化則其所說無相勝彼有作之福故曰非無無盡福亦得是釋疑也什本則曰不取於相如如不動夫言不取於相則理絶常想言如如不動則妙極真源惟其如是乃契般若斯所以顯持說福勝淨名曰善能分別諸法相於第一義而不動蓋今說之謂也疑天親曰復有疑若諸佛常為衆生說法云何言入涅槃為斷此疑如經經何以故一切有為法止應作如是觀論此下三論並依九喻釋無著曰二為流轉不染故於中顯示四種有為相一自性相謂共相見識如星光以無智暗中有有智明中無故人法我見如翳取本無義故妄識如燈以渴愛潤取緣能熾然故二著所味相味著顛倒境界如彼幻倒見故三隨順過失相謂隨順無常等過如露體相無有故隨順受相如泡以有受皆苦凡三苦故四隨順出離相謂觀過去行等如夢隨念所現故現在不久住故如電未來種子依阿黎耶識出生諸法如空中出雲如是了知三世行已通達人法無我得出離故頌曰非有為非離諸如來涅槃九種有為法妙智正觀故見相及於識器身受用事過去現在法亦觀未來世觀相及受用觀於三世事於有為法中得無垢自在天親釋曰如來為斷疑故說九喻偈謂諸佛雖得涅槃非有為法亦不離有為以化身說法示現世間利益衆生故此明佛於涅槃世間皆不住也何故示現世間而不住有為法故曰九種有為法等謂如星等九種法譬成九正觀觀九種境故言見相及於識等謂觀見如星為日所映有而不現能見心法亦復如是觀有為相如翳見毛輪等色以顛倒見故觀識如燈依止貪愛法住故觀所依住處如幻以器世間無一體實故觀身如露少時住故觀所受用事如泡受想因三法不定故觀過去法如夢唯念現故觀現在法如電剎那不住故觀未來法如雲以阿黎識與一切法為種子故又總唯三種謂觀相如見識相觀受用如器世間等觀有為法如三世轉現等如是總別觀一切法則於世間有為法中得自在無礙智故曰得無垢自在唐譯大同功德施曰此無住涅槃觀察有為然後方證云何觀察謂觀察自在如星觀物境如翳觀遷動如燈觀體性如幻觀少盛如露觀壽命如泡觀作者如夢觀心識如電觀有為如雲等云云復次先依俗諦以星等喻安立有為後依中論第一義明一切法不生不滅不斷不常不一不異不來不去及般若中一切法非積住性以次帖釋云云文煩不盡斷疑二十五會解曰無著以此兼於上文為二種無染此謂流轉無染也以其善觀四種有為法故不為生死所流轉天親意彰釋疑以謂雖得涅槃而不住涅槃不妨化身說法雖示現世間而不住有為以其正智善觀察故然而什本特加何以故者還徵釋上不住於相如如不動之旨夫觀諸法如幻化相則是相皆遣尚不住涅槃況有為之相而不遣邪所謂設有一法過涅槃者我亦說如幻化故知但了如幻不住有無自然妙契如如安住不動徵一得二理在其中由是言之回觀魏譯言同意淺什譯良有旨哉喻有加略加一略四者直取如幻大旨而已星翳等喻幻義稍疏故略之無各如諸家封法之釋纂者疊疑之喻皆失其源流入巧見非大方之說然以是偈殿於經末亦依經示觀之意苟能日用以為心要不唯觀達有為抑足照了無相也經佛說是經已止信受奉行論無別釋會解曰此經流通諸論固無定判而章疏科節或復進退云云今謂凡流通亦多門有付囑者有勸持者有校量功德者有示方軌者有請名結要者有隨經結益者有從物偏好乘乘不同者有發誓弘護者有信受奉行等皆流通也若准此意則合追指自須菩提發阿耨多羅三藐三菩提心者下具諸流通義言於一切法應如是知等則付囑流通也令如是知解或從富文言之或通指一經所說況發心之言與初文同故知正通其理一貫次若有人等校量福勝勸持也云何為人演說等示持說方執也佛說是經下如說奉行也歡喜之言即四悉之一通亦具四皆生喜故請名結要則又見於上文餘亦應具文缺略耳然以此經垂之後世流通無壅受持特盛者得非以一經始終校量功深殷勤付囑般若冥資之力衆生乘種之深故也雖然希利而持經吾未見其能持惟不以利而持經庶幾如來流通之旨乎讀者宜尊行之愚述此書始於己亥歲草創于東湖蘭若以其編例東安置之以篋笥無慮二十年至乙卯叨南湖祖席戊午夏坐足疾稍閒因得治定成四帙畢酬素志既而有竺峰之命衆請刊餘四經板藉次乃獲鋟工才得卷餘㩗以東歸於茲中輟者又十餘載其業不易究如此自謂不復舉此話矣山門學者妙見懺首慨茲墜緒有激于申毅然發志募諸同袍道舊相與助成教門一段因緣於戲起斯文於溝中之斷豈易得邪柏庭老衲書始末于供觀山色云
